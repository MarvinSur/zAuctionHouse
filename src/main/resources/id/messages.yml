################################################################################################################################
#
#   zAuctionHouse V4 - Messages Configuration
#
#   File ini berisi semua pesan yang akan dilihat oleh player dari plugin.
#   Sesuaikan pesan-pesan ini dengan gaya bahasa server kamu.
#
#   FORMATTING:
#   - Mendukung format MiniMessage: <red>, <bold>, <gradient:red:blue>, dsb.
#   - Mendukung warna hex: #RRGGBB atau #RGB
#   - Mendukung kode warna lama: &c, &l, dsb. (tidak disarankan, pakai MiniMessage aja)
#   - Gunakan shortcut warna kustom yang ada di config.yml: <primary>, <secondary>, <error>, <success>
#
#   PLACEHOLDERS:
#   - Format %placeholder% digunakan untuk nilai yang dinamis
#   - Placeholder yang tersedia berbeda-beda tiap pesan (dijelaskan di bawah)
#
################################################################################################################################

#=============================================================================
# GENERAL MESSAGES
#=============================================================================

# Prefix yang ditambahkan di awal setiap pesan plugin.
# Kosongkan "" jika tidak ingin pakai prefix.
prefix: "<primary>zAuctionHouse <secondary>• "

#=============================================================================
# VERSION & UPDATE MESSAGES
#=============================================================================

# Muncul ketika ada versi plugin baru (jika version-checker aktif).
version-available: "<#ff0000>Ada versi terbaru zAuctionHouse lho! <gray>(<white>sekarang: <#ff9900>%version% <gray>| <white>terbaru: <#00ff00>%latest%<gray>)"

#=============================================================================
# COMMAND MESSAGES
#=============================================================================

# Muncul ketika player salah menggunakan command.
command-syntax-error: "<error>Cara pakainya gini nih<gray>: <success>%syntax%"

# Muncul ketika player tidak punya permission.
command-no-permission: "<error>Waduh, kamu gak punya akses buat pakai command ini."

# Muncul ketika command player-only dijalankan dari console.
command-no-console: "<error>Command ini cuma bisa dipakai oleh player di dalam game."

# Muncul ketika argumen command tidak dikenali.
command-no-arg: "<error>Gagal nemuin command yang kamu maksud nih."

# Muncul ketika command dibatasi (misal di world tertentu).
command-restricted: "<error>Kamu gak bisa pakai command ini di sini."

# Muncul ketika player spam command (cooldown).
command-cooldown: "<error>Sabar ya, tunggu sebentar sebelum pakai command ini lagi."

# Format bantuan command.
command-syntax-help: "<white>%syntax% <dark_gray>» <gray>%description%"

