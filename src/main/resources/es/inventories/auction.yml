################################################################################################################################
#
#   zAuctionHouse V4 - Inventario Principal de la Casa de Subastas
#
#   Este es el inventario principal que muestra todos los objetos en venta.
#   Los jugadores acceden a el mediante /ah o haciendo clic en un NPC.
#
#   Este inventario muestra:
#   - Todos los objetos actualmente en venta
#   - Navegacion hacia categorias, objetos caducados, objetos comprados
#   - Opciones de ordenamiento
#   - Paginacion para navegar entre multiples paginas
#
#   Documentacion: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# CONFIGURACION DEL INVENTARIO
#=============================================================================

# Titulo del inventario mostrado en la parte superior del GUI.
# Soporta placeholders y formato MiniMessage.
# Placeholders disponibles:
#   %page%                        - Numero de pagina actual
#   %max-page%                    - Numero total de paginas
#   %zauctionhouse_category_name% - Nombre de la categoria actual
name: "%zauctionhouse_category_name% (%page%/%max-page%)"

# Tamano del inventario en slots (debe ser multiplo de 9).
# Opciones: 9, 18, 27, 36, 45, 54 (1-6 filas)
# 54 slots (6 filas) es recomendado para la casa de subastas.
size: 54

#=============================================================================
# PATRONES
#=============================================================================
# Los patrones son plantillas reutilizables que agregan elementos comunes.
# Se aplican en orden; los patrones posteriores pueden sobrescribir los anteriores.

patterns:
  # Agrega bordes decorativos de vidrio (filas superior e inferior)
  - 'zauctionhouse-decoration'
  # Agrega botones de navegacion (pagina anterior/siguiente)
  - 'zauctionhouse-pagination'

#=============================================================================
# OBJETOS
#=============================================================================
# Los objetos definen los botones y visualizaciones en este inventario.
# Cada objeto tiene una clave unica (ej: 'display-items', 'categories').

items:

  #---------------------------------------------------------------------------
  # VISUALIZACION DE OBJETOS EN VENTA
  #---------------------------------------------------------------------------
  # Esta es la visualizacion principal que muestra todos los objetos en venta.
  # Los objetos estan paginados y pueden filtrarse por categoria.

  display-items:
    # Tipo de boton - ZAUCTIONHOUSE_LISTED_ITEMS es un tipo especifico del plugin.
    # Gestiona automaticamente:
    # - Carga y visualizacion de objetos
    # - Filtrado por categoria
    # - Ordenamiento
    # - Acciones al clic (comprar/retirar)
    type: ZAUCTIONHOUSE_LISTED_ITEMS

    # Slot para mostrar el objeto "vacio" cuando no se encuentra ningun objeto.
    # Este slot se usa cuando la casa de subastas esta vacia.
    empty-slot: 22

    # Slots donde se muestran los objetos.
    # Estas deberian ser las filas centrales (dejando arriba/abajo para la UI).
    # Rangos de slots: '9-17' significa slots del 9 al 17 (9 objetos por fila).
    # Total: 36 slots para objetos (4 filas x 9 columnas)
    slots:
      - 9-17    # Fila 2
      - 18-26   # Fila 3
      - 27-35   # Fila 4
      - 36-44   # Fila 5

    # Objeto mostrado cuando no hay objetos en venta (casa de subastas vacia).
    item:
      material: BARRIER
      # &n crea texto subrayado (formato legacy)
      name: '#ff0000&nNingun objeto encontrado'

  #---------------------------------------------------------------------------
  # BOTON CATEGORIAS
  #---------------------------------------------------------------------------
  # Abre el inventario de seleccion de categoria para filtrar objetos.

  categories:
    # Posicion del slot - centro de la fila superior.
    slot: 4

    # Tipo de boton - 'inventory' abre otro inventario zMenu.
    type: inventory

    # Plugin propietario del inventario destino.
    plugin: "zAuctionHouse"

    # Archivo de inventario a abrir (inventories/categories.yml).
    inventory: "categories"
    is-permanent: true

    # Apariencia del boton
    item:
      material: CHEST
      name: "#2CCED2<bold>CATEGORIAS"
      lore:
        - ""
        - "#8c8c8c* #2CCED2Clic #92ffffpara abrir"

  #---------------------------------------------------------------------------
  # BOTON OBJETOS CADUCADOS
  #---------------------------------------------------------------------------
  # Muestra los objetos del jugador que han caducado (no vendidos a tiempo).
  # La apariencia del boton cambia segun si existen objetos.

  expired-items:
    # Tipo de boton - abre el inventario de objetos caducados si hay objetos.
    type: ZAUCTIONHOUSE_EXPIRED_INVENTORY

    # Posicion del slot - extremo izquierdo de la fila inferior.
    slot: 45

    # Objeto mostrado cuando el jugador TIENE objetos caducados.
    item:
      # Textura de cabeza personalizada (icono reloj de arena/reloj).
      url: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvZjdhYWRmZjlkZGM1NDZmZGNlYzZlZDU5MTljYzM5ZGZhOGQwYzA3ZmY0YmM2MTNhMTlmMmU2ZDdmMjU5MyJ9fX0="
      name: "#2CCED2<bold>OBJETOS CADUCADOS"
      lore:
        # %expired-items% = numero de objetos caducados
        # %s% = sufijo de pluralizacion ("" para 1, "s" para 2+)
        - "#92ffffTienes #2CCED2%expired-items% #92ffffobjeto%s% caducado%s%."
        - ""
        - "#8c8c8c* #2CCED2Clic #92ffffpara abrir"

    # Objeto mostrado cuando el jugador NO TIENE objetos caducados.
    else:
      item:
        url: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvZjdhYWRmZjlkZGM1NDZmZGNlYzZlZDU5MTljYzM5ZGZhOGQwYzA3ZmY0YmM2MTNhMTlmMmU2ZDdmMjU5MyJ9fX0="
        name: "#2CCED2<bold>OBJETOS CADUCADOS"
        lore:
          - "#ff3535No tienes objetos caducados."

  #---------------------------------------------------------------------------
  # BOTON OBJETOS COMPRADOS
  #---------------------------------------------------------------------------
  # Muestra los objetos que el jugador ha comprado pero aun no ha retirado.

  purchased-items:
    # Tipo de boton - abre el inventario de objetos comprados si hay objetos.
    type: ZAUCTIONHOUSE_PURCHASED_INVENTORY

    # Posicion del slot - segundo desde la izquierda en la fila inferior.
    slot: 46

    # Objeto mostrado cuando el jugador TIENE objetos comprados por retirar.
    item:
      # Textura icono cofre.
      url: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvZjM3Y2FlNWM1MWViMTU1OGVhODI4ZjU4ZTBkZmY4ZTZiN2IwYjFhMTgzZDczN2VlY2Y3MTQ2NjE3NjEifX19"
      name: "#2CCED2<bold>OBJETOS COMPRADOS"
      lore:
        - "#92ffffTienes #2CCED2%purchased-items% #92ffffobjeto%s% comprado%s%."
        - ""
        - "#8c8c8c* #2CCED2Clic #92ffffpara abrir"

    # Objeto mostrado cuando el jugador NO TIENE objetos comprados.
    else:
      item:
        url: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvZjM3Y2FlNWM1MWViMTU1OGVhODI4ZjU4ZTBkZmY4ZTZiN2IwYjFhMTgzZDczN2VlY2Y3MTQ2NjE3NjEifX19"
        name: "#2CCED2<bold>OBJETOS COMPRADOS"
        lore:
          - "#ff3535No tienes objetos comprados."

  #---------------------------------------------------------------------------
  # BOTON TUS OBJETOS (EN VENTA)
  #---------------------------------------------------------------------------
  # Muestra los objetos que el jugador tiene actualmente en venta.

  selling-items:
    # Tipo de boton - abre el inventario de objetos en venta si hay objetos.
    type: ZAUCTIONHOUSE_SELLING_INVENTORY

    # Posicion del slot - extremo derecho de la fila inferior.
    slot: 53

    # Objeto mostrado cuando el jugador TIENE objetos en venta.
    item:
      # Textura icono jugador.
      url: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvMjU4MDdjYzRjM2I2OTU4YWVhNjE1NmU4NDUxOGQ5MWE0OWM1ZjMyOTcxZTZlYjI2OWEyM2EyNWEyNzE0NSJ9fX0="
      name: "#2CCED2<bold>TUS OBJETOS"
      lore:
        - "#92ffffTienes #2CCED2%selling-items% #92ffffobjeto%s% en venta."
        - ""
        - "#8c8c8c* #2CCED2Clic #92ffffpara abrir"

    # Objeto mostrado cuando el jugador NO TIENE objetos en venta.
    else:
      item:
        url: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvMjU4MDdjYzRjM2I2OTU4YWVhNjE1NmU4NDUxOGQ5MWE0OWM1ZjMyOTcxZTZlYjI2OWEyM2EyNWEyNzE0NSJ9fX0="
        name: "#2CCED2<bold>TUS OBJETOS"
        lore:
          - "#ff3535No tienes objetos en venta."

  #---------------------------------------------------------------------------
  # BOTON BUSCAR
  #---------------------------------------------------------------------------
  # Abre la entrada de busqueda por chat para filtrar objetos.

  search:
    type: ZAUCTIONHOUSE_SEARCH
    slot: 47
    is-permanent: true
    item:
      material: COMPASS
      name: "#2CCED2<bold>ʙᴜsᴄᴀʀ"
      lore:
        - ""
        - "#92ffffBusqueda actual#8c8c8c: #2CCED2%search_query%"
        - ""
        - "#92ffffFiltros#8c8c8c:"
        - "#8c8c8c  name #76CDCD~ #8c8c8cvalor    #555555(contiene)"
        - "#8c8c8c  name #76CDCD= #8c8c8cvalor    #555555(exacto)"
        - "#8c8c8c  name #76CDCD~= #8c8c8cvalor   #555555(contiene, sin mayusculas)"
        - "#8c8c8c  name #76CDCD== #8c8c8cvalor   #555555(exacto, sin mayusculas)"
        - ""
        - "#92ffffCampos#8c8c8c: #76CDCDname#8c8c8c, #76CDCDmaterial#8c8c8c, #76CDCDlore#8c8c8c, #76CDCDseller"
        - ""
        - "#92ffffEjemplos#8c8c8c:"
        - "#8c8c8c  seller #76CDCD= #8c8c8cNotch"
        - "#8c8c8c  name #76CDCD~ #8c8c8cDiamond"
        - ""
        - "#8c8c8c- #2CCED2Clic izquierdo #92ffffpara buscar"
        - "#8c8c8c- #2CCED2Clic derecho #92ffffpara borrar la busqueda"

  #---------------------------------------------------------------------------
  # BOTON ACTUALIZAR
  #---------------------------------------------------------------------------
  # Muestra informacion de la casa de subastas y actualiza la lista.

  refresh:
    # Tipo de boton - ZAUCTIONHOUSE_REFRESH gestiona la actualizacion asincrona.
    type: ZAUCTIONHOUSE_REFRESH

    # Posicion del slot - centro de la fila inferior.
    slot: 49

    # Objeto mostrado durante la carga/actualizacion (previene clics spam).
    loading-item:
      material: CLOCK
      name: "#2CCED2<bold>ᴀᴄᴛᴜᴀʟɪᴢᴀɴᴅᴏ..."
      lore:
        - "#8c8c8c* #ff3535Cargando, espere..."

    # Visualizacion normal del boton de actualizacion.
    item:
      material: BELL
      name: "#2CCED2<bold>INFORMACION"
      lore:
        - "#92ffffBienvenido a la casa de subastas."
        - "#92ffffIntercambia objetos con otros jugadores."
        - ""
        - "#92ffffUso#8c8c8c:"
        - "#2CCED2/ah sell #92ffff<precio> [<cantidad>]"
        - ""
        # Placeholder PlaceholderAPI para estadisticas dinamicas.
        - "#92ffffNumero de objetos#8c8c8c: #2CCED2%zauctionhouse_listed_items%"
        - "#92ffffTipo de orden#8c8c8c: #2CCED2%zauctionhouse_sorting_name%"
        - ""
        - "#8c8c8c* #2CCED2Clic #92ffffpara actualizar los objetos"

  #---------------------------------------------------------------------------
  # BOTON TIPO DE ORDEN
  #---------------------------------------------------------------------------
  # Cambia el orden de los objetos mostrados.

  change-sort:
    # Tipo de boton - gestiona el ciclo de ordenamiento.
    type: ZAUCTIONHOUSE_CHANGE_SORT

    # Opciones de ordenamiento disponibles (ciclos en este orden).
    # Opciones: DECREASING_DATE, DECREASING_PRICE, ASCENDING_DATE, ASCENDING_PRICE
    sorts:
      - DECREASING_DATE   # Mas reciente primero (predeterminado)
      - DECREASING_PRICE  # Mas caro primero
      - ASCENDING_DATE    # Mas antiguo primero
      - ASCENDING_PRICE   # Mas barato primero

    # Formato para la opcion de ordenamiento actualmente SELECCIONADA en el lore.
    # %sorting% se reemplaza con el nombre del ordenamiento de config.yml.
    enable-text: ' #F27438-> %sorting%'

    # Formato para las opciones de ordenamiento NO seleccionadas en el lore.
    disable-text: ' #76CDCD-> %sorting%'

    # Objeto mostrado durante la carga/ordenamiento (previene clics spam).
    loading-item:
      material: HOPPER
      name: "#2CCED2<bold>TIPO DE ORDEN"
      lore:
        - "#8c8c8c* #ff3535Cargando, espere"

    # Posicion del slot - lado derecho de la fila inferior.
    slot: 52

    # Visualizacion normal del boton de ordenamiento.
    item:
      material: HOPPER
      name: "#2CCED2<bold>TIPO DE ORDEN"
      lore:
        - "#92ffffTipos de orden disponibles:"
        # Placeholder para cada opcion de ordenamiento (formateados por enable/disable-text).
        - "%DECREASING_DATE%"
        - "%DECREASING_PRICE%"
        - "%ASCENDING_DATE%"
        - "%ASCENDING_PRICE%"
        - ""
        - "#8c8c8c* #2CCED2Clic #92ffffpara cambiar el tipo de orden"
