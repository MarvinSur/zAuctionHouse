#=============================================================================
# RESTRICCIONES DE MUNDOS
#=============================================================================

# Mundos donde los jugadores no pueden crear nuevos anuncios.
# Los jugadores todavia pueden VER y COMPRAR objetos, pero no VENDER.
# Util para restringir las ventas en mundos de eventos, minijuegos, etc.
