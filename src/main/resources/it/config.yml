#=============================================================================
# OGGETTI SPECIALI
#=============================================================================

# Oggetti di visualizzazione speciali usati nell'interfaccia della casa d'aste.
# Sostituiscono l'anteprima reale dell'oggetto per casi speciali.

special-items:
  # Oggetto di visualizzazione per le vendite in lotto (pi√Ļ oggetti in un annuncio)
  # Questa icona baule indica che cliccando si mostrer√† il contenuto.
  auction-item:
    material: CHEST
    name: "#00ff00Vendita in lotto"

#=============================================================================
# FORMATTAZIONE DELLA VISUALIZZAZIONE DEGLI OGGETTI
#=============================================================================

# Configurazione per la visualizzazione degli oggetti nei messaggi e nel lore.
# Usato per mostrare i nomi degli oggetti nei messaggi di chat e nelle notifiche.

item-display:
  # Formato per gli oggetti che usano le chiavi di traduzione di Minecraft
  # Usato quando l'oggetto ha una chiave di traduzione (la maggior parte degli oggetti vanilla)
  # Placeholder: %amount%, %item-translation-key%
  lang: "#8ee6e3x%amount% &7<lang:%item-translation-key%>"

  # Formato per gli oggetti con nomi di visualizzazione personalizzati
  # Usato quando l'oggetto ha un nome personalizzato definito da plugin o incudini
  # Placeholder: %amount%, %item-name%
  item-name: "#8ee6e3x%amount% &7%item-name%"

  # Separatore usato tra gli ultimi due oggetti di una lista
  # Esempio: "Diamante, Oro e Smeraldo"
  and: " &fe "

  # Separatore usato tra gli oggetti di una lista (tranne gli ultimi due)
  # Esempio: "Diamante, Oro, Ferro"
  between: "&f, "

  # Quando attivato, gli oggetti simili vengono uniti nella visualizzazione
  # Esempio: "3x Diamante" invece di "Diamante, Diamante, Diamante"
  merge-similar-items: true

#=============================================================================
# FORMATO DEL TEMPO
#=============================================================================

# Etichette delle unit√† di tempo e formati di visualizzazione per countdown e durate.
# Usato in tutto il plugin per i timer di scadenza, tempo rimanente, ecc.

time:
  # Etichette delle unit√† di tempo (forme singolari e plurali)
  second: secondo
  seconds: secondi

  minute: minuto
  minutes: minuti

  hour: ora
  hours: ore

  day: giorno
  days: giorni

  # Stringhe di formato tempo usando placeholder stile printf
  # %02d = Numero completato a 2 cifre (es: 01, 05, 12)
  # %second%, %minute%, %hour%, %day% = Unit√† dinamica secondo la quantit√†
  #
  # Formato per durate >= 1 giorno
  # Esempio di output: "02…Ę 05 ú 30Šīć"
  time-day: '%02d…Ę %02d ú %02dŠīć'

  # Formato per durate >= 1 ora ma < 1 giorno
  # Esempio di output: "05 ú 30Šīć 45s"
  time-hour: '%02d ú %02dŠīć %02ds'

  # Formato per durate >= 1 minuto ma < 1 ora
  # Esempio di output: "30Šīć 45s"
  time-minute: '%02dŠīć %02ds'

  # Formato per durate < 1 minuto
  # Esempio di output: "45s"
  time-second: '%02ds'

#=============================================================================
# COMPORTAMENTO DELLE AZIONI
#=============================================================================

# Configurazione del comportamento delle diverse azioni nel plugin.
# Controlla cosa succede dopo acquisti, ritiri e altre operazioni.

action:
  # Quando attivato, l'inventario delle aste si aggiorna automaticamente ad aggiunte/rimozioni di oggetti.
  # Disattivare se si riscontrano problemi di prestazioni con aggiornamenti frequenti.
  update-inventory-on-action: true

  # Quando attivato, il filtro categoria viene reimpostato ogni volta che un giocatore apre la casa d'aste.
  # Quando disattivato, la categoria selezionata in precedenza persiste tra le aperture.
  reset-category-on-open: true

  # Quando attivato, il filtro di ricerca viene reimpostato ogni volta che un giocatore apre la casa d'aste.
  # Quando disattivato, la ricerca inserita in precedenza persiste tra le aperture.
  reset-search-on-open: true

  # Comportamento durante il ritiro di un oggetto dagli annunci attivi (il venditore annulla la vendita)
  remove-listed-item:
    # Se true, l'oggetto viene dato immediatamente all'inventario del giocatore
    # Se false, l'oggetto va nella sezione "oggetti scaduti" per il ritiro successivo
    give-item: false

    # Se true, riapre l'inventario delle aste dopo il ritiro dell'oggetto
    open-inventory: true

    # Se true, mostra un GUI di conferma prima di ritirare l'oggetto
    # Consigliato: Attivare per evitare ritiri accidentali
    open-confirm-inventory: true

  # Comportamento durante il ritiro degli oggetti scaduti
  remove-expired-item:
    # Se true, riapre l'inventario degli oggetti scaduti dopo il ritiro
    open-inventory: true

  # Comportamento durante l'acquisto degli oggetti
  purchased-item:
    # Se true, gli oggetti acquistati vengono dati immediatamente all'inventario dell'acquirente
    # Se false, gli oggetti vanno nella sezione "oggetti acquistati" per il ritiro successivo
    give-item: false

    # Se give-item √® true, questo verifica se il giocatore ha abbastanza spazio nel suo inventario
    # Se false e non c'√® spazio disponibile, l'acquisto viene bloccato
    player-inventory-must-have-free-space: true

    # Se true, riapre l'inventario delle aste dopo l'acquisto
    open-inventory: true

    # Feedback visivo quando il giocatore non ha abbastanza soldi
    money-item:
      # Attivare o disattivare il feedback visivo
      enable: true
      # Durata in tick per mostrare l'oggetto di errore (20 tick = 1 secondo)
      duration: 60
      # Oggetto mostrato al posto dell'acquisto quando i fondi sono insufficienti
      item:
        material: BARRIER
        name: "#ff3535‚úė Non hai abbastanza soldi per comprare questo!"

    # Se true, invia un messaggio in chat quando il giocatore non pu√≤ pagare
    money-message: true

    # Suono riprodotto quando il giocatore non pu√≤ pagare
    money-sound:
      enable: true
      # Categoria del suono (influisce sui cursori di volume)
      category: MASTER
      # Identificatore del suono Minecraft
      sound: minecraft:entity.villager.no
      # Livello di volume (0.0 a 1.0)
      volume: 1
      # Tonalit√† (0.5 a 2.0, 1.0 √® normale)
      pitch: 1

  # Comportamento durante il ritiro degli oggetti dall'inventario "i tuoi oggetti" (in vendita)
  selling-item:
    # Se true, riapre l'inventario degli oggetti in vendita dopo il ritiro
    open-inventory: true

#=============================================================================
# CONFIGURAZIONE DELL'AUTO-RISCOSSIONE
#=============================================================================

# Riscossione automatica di denaro per le vendite offline.
# Quando un oggetto di un giocatore si vende durante la sua assenza, il denaro viene memorizzato come "in sospeso".
# Questa configurazione controlla come viene gestito il denaro in sospeso.

auto-claim:
  # Se true, il denaro in sospeso viene automaticamente depositato quando il giocatore si connette
  # Se false, i giocatori devono eseguire manualmente /ah claim per ricevere i loro soldi
  enable: false

  # Ritardo in tick prima dell'auto-riscossione alla connessione (20 tick = 1 secondo)
  # Questo lascia tempo al giocatore di caricarsi completamente prima delle transazioni.
  # Impostare a 0 per riscossione immediata (non consigliato).
  delay-ticks: 20

  # Se true, invia un messaggio al giocatore quando il suo denaro viene auto-riscosso
  notify-player: true

  # Se l'auto-riscossione √® disattivata, questa opzione notifica il giocatore del denaro in sospeso
  # Utile per ricordare ai giocatori di riscuotere i loro guadagni
  notify-pending: true

  # Ritardo prima di inviare la notifica del denaro in sospeso
  notify-delay-ticks: 40

  # Stringa di motivazione passata al plugin di economia per la transazione
  # Pu√≤ apparire nei log di economia o nello storico delle transazioni
  deposit-reason: "Denaro delle aste riscosso"

#=============================================================================
# NOTIFICA DI VENDITA
#=============================================================================

# Notifiche inviate ai giocatori riguardo agli oggetti venduti durante la loro assenza.
# Informa i venditori delle loro vendite riuscite quando si riconnettono.

sales-notification:
  # Se true, i giocatori ricevono un riepilogo delle vendite offline alla connessione
  enable: true

  # Ritardo in tick prima di inviare la notifica (20 tick = 1 secondo)
  # Valori pi√Ļ alti permettono ad altri messaggi di connessione di apparire prima.
  delay-ticks: 60

#=============================================================================
# CONFIGURAZIONE DELLE PRESTAZIONI
#=============================================================================

# Impostazioni avanzate delle prestazioni per case d'aste di grandi dimensioni.
# Queste impostazioni controllano la cache, l'elaborazione parallela e i timeout.
# La maggior parte dei server non avr√† bisogno di modificare questi valori predefiniti.

performance:
  # Configurazione della cache per le liste di oggetti ordinati.
  # La cache pre-ordina gli oggetti per fornire accesso O(1) per la paginazione.
  cache:
    # Numero minimo di oggetti prima di usare l'ordinamento parallelo (Arrays.parallelSort).
    # L'ordinamento parallelo migliora le prestazioni per grandi set di dati ma ha un overhead per quelli piccoli.
    # Consigliato: 10000 per la maggior parte dei server. Abbassare se hai molti core CPU disponibili.
    parallel-sort-threshold: 10000

    # Numero minimo di oggetti prima di elaborare le categorie in parallelo.
    # Le categorie vengono elaborate simultaneamente quando questa soglia viene superata.
    # Consigliato: 5000 per la maggior parte dei server.
    parallel-category-threshold: 5000

    # Numero di thread da usare per l'elaborazione parallela.
    # Impostare a -1 per il rilevamento automatico (usa processori disponibili - 1, minimo 2).
    # Impostare un numero specifico per sovrascrivere il rilevamento automatico.
    parallelism: -1

  # Configurazione dei timeout per le operazioni cluster (configurazioni multi-server).
  # Questi timeout impediscono alle operazioni di rimanere bloccate indefinitamente.
  # Tutti i valori sono in millisecondi.
  cluster-timeout:
    # Timeout per verificare la disponibilit√† di un oggetto sui server.
    check-availability-ms: 5000

    # Timeout per acquisire un lock su un oggetto.
    lock-item-ms: 5000

    # Timeout per rilasciare un lock su un oggetto.
    unlock-item-ms: 3000

    # Timeout per notificare altri server dei cambiamenti di stato.
    notify-status-change-ms: 3000

    # Timeout per notificare altri server degli acquisti/rimozioni di oggetti.
    notify-item-action-ms: 5000

#=============================================================================
# CONFIGURAZIONE DELL'ORDINAMENTO
#=============================================================================

# Opzioni di ordinamento degli oggetti per la visualizzazione della casa d'aste.
# Controlla come vengono ordinati gli oggetti durante la visualizzazione degli annunci.

sort-items:
  # Tipo di ordinamento predefinito applicato quando un giocatore apre la casa d'aste per la prima volta
  # Opzioni: ASCENDING_PRICE, ASCENDING_DATE, DECREASING_DATE, DECREASING_PRICE
  default-sort: DECREASING_DATE

  # Nomi di visualizzazione per ogni tipo di ordinamento nel GUI
  translations:
    ASCENDING_PRICE: "Šīė ÄŠīáŠīĘŠīĘŠīŹ ŠīĄ ÄŠīásŠīĄŠīá…īŠīõŠīá"      # Pi√Ļ economico prima
    ASCENDING_DATE: "ŠīÖŠīÄŠīõŠīÄ ŠīĄ ÄŠīásŠīĄŠīá…īŠīõŠīá"       # Pi√Ļ vecchio prima
    DECREASING_DATE: "ŠīÖŠīÄŠīõŠīÄ ŠīÖŠīáŠīĄ ÄŠīásŠīĄŠīá…īŠīõŠīá"     # Pi√Ļ recente prima
    DECREASING_PRICE: "Šīė ÄŠīáŠīĘŠīĘŠīŹ ŠīÖŠīáŠīĄ ÄŠīásŠīĄŠīá…īŠīõŠīá"   # Pi√Ļ costoso prima

#=============================================================================
# CONFIGURAZIONE DEI FILTRI DI RICERCA
#=============================================================================

# Configura gli operatori dei filtri di ricerca usati nel sistema di ricerca.
# Ogni tipo di filtro corrisponde a un operatore che i giocatori digitano nella barra di ricerca.
#
# Esempio: "seller = Notch", "name ~ Diamond", "material ~= sword"
#
# ATTENZIONE: Gli operatori devono essere unici. Evita operatori che sono prefissi di altri
# (es: "=" e "==" funzionano perch√© gli operatori pi√Ļ lunghi vengono verificati per primi).

search-filters:
  # Contiene (sensibile alle maiuscole): campo ~ valore
  CONTAINS: "~"
  # Corrispondenza esatta (sensibile alle maiuscole): campo = valore
  EQUALS: "="
  # Contiene (ignora maiuscole): campo ~= valore
  CONTAINS_IGNORE_CASE: "~="
  # Corrispondenza esatta (ignora maiuscole): campo == valore
  EQUALS_IGNORE_CASE: "=="

################################################################################################################################
# MIGRAZIONE DA ALTRI PLUGIN
################################################################################################################################
# Questa sezione permette di migrare dati da altri plugin d'aste a zAuctionHouse V4.
#
# COME MIGRARE:
# 1. Configura la sezione sorgente appropriata qui sotto con le impostazioni DB del tuo vecchio plugin
# 2. Ferma il server e fai un backup di tutti i dati (CRITICO!)
# 3. Avvia il server con zAuctionHouse V4
# 4. Esegui: /ah admin migrate <sorgente> confirm
#
# SORGENTI SUPPORTATE:
#   - zauctionhousev3 (alias: zah, zahv3, v3)
#
# ATTENZIONE: Fai sempre un backup dei tuoi dati prima di migrare! La migrazione non pu√≤ essere annullata.

migration:

  #============================================================
  # Migrazione zAuctionHouse V3
  #============================================================
  # Migra i dati da zAuctionHouse V3 a V4.
  # Comando: /ah admin migrate zauctionhousev3 confirm
  zauctionhouse-v3:
    # Tipo di archiviazione sorgente di V3
    # Opzioni: MYSQL, MARIADB, SQLITE, o JSON
    source-type: SQLITE

    # Prefisso tabella usato nella tua installazione V3
    # Controlla il tuo config.yml V3 se non sei sicuro (il predefinito era "zauctionhouse_")
    table-prefix: "zauctionhouse_"

    # === Configurazione SQLite ===
    # Percorso al file database SQLite V3 (relativo alla root del server)
    sqlite-path: "plugins/zAuctionHousev3/database.db"

    # === Configurazione MySQL/MariaDB ===
    # Necessario solo se source-type √® MYSQL o MARIADB
    host: "localhost"
    port: 3306
    database: "zauctionhouse"
    user: "root"
    password: ""

    # === Configurazione JSON ===
    # Percorso alla cartella dati V3 contenente i file di archiviazione JSON
    json-folder: "plugins/zAuctionHouseV3"

  #============================================================
  # Future Sorgenti di Migrazione
  #============================================================
  # Sorgenti di migrazione aggiuntive saranno aggiunte nei futuri aggiornamenti.
  # Esempi:
  # axauctions:
  #   source-type: SQLITE
  #   sqlite-path: "plugins/AxAuctions/data.db"

################################################################################################################################
# CONFIGURAZIONE ADMIN GENERATE
################################################################################################################################
# Configurazione per il comando /ah admin generate.
# Questo comando crea oggetti fittizi per i test di prestazioni.
#
# UTILIZZO: /ah admin generate <quantit√†>
#
# ATTENZIONE: Gli oggetti generati sono SOLO per i TEST. Eliminali dopo i test.

admin-generate:

  #============================================================
  # Configurazione del Tempo di Scadenza
  #============================================================
  # Controlla il tempo di scadenza degli oggetti generati.

  expiration:
    # Modalit√†: FIXED o RANDOM
    # FIXED: Tutti gli oggetti usano il valore 'fixed'
    # RANDOM: Gli oggetti ottengono un valore casuale tra 'min' e 'max'
    mode: RANDOM

    # Tempo di scadenza fisso in secondi (usato quando mode √® FIXED)
    fixed: 172800  # 2 giorni

    # Tempo di scadenza minimo in secondi (usato quando mode √® RANDOM)
    min: 3600      # 1 ora

    # Tempo di scadenza massimo in secondi (usato quando mode √® RANDOM)
    max: 604800    # 7 giorni

  #============================================================
  # Configurazione del Prezzo
  #============================================================
  # Controlla il prezzo degli oggetti generati.

  price:
    # Modalit√†: FIXED o RANDOM
    mode: RANDOM

    # Prezzo fisso (usato quando mode √® FIXED)
    fixed: 1000

    # Prezzo minimo (usato quando mode √® RANDOM)
    min: 10

    # Prezzo massimo (usato quando mode √® RANDOM)
    max: 1000000

  #============================================================
  # Configurazione della Quantit√† di Oggetti
  #============================================================
  # Controlla la dimensione dello stack degli oggetti generati.

  item-amount:
    # Modalit√†: FIXED o RANDOM
    mode: RANDOM

    # Quantit√† fissa (usato quando mode √® FIXED)
    # Sar√† limitata alla dimensione max dello stack dell'oggetto
    fixed: 1

    # Quantit√† minima (usato quando mode √® RANDOM)
    min: 1

    # Quantit√† massima (usato quando mode √® RANDOM)
    # Usa -1 per usare la dimensione max dello stack dell'oggetto come massimo
    max: -1

  #============================================================
  # Configurazione degli Oggetti in Lotto
  #============================================================
  # Gli oggetti in lotto sono annunci con pi√Ļ oggetti (come le scatole shulker).
  # Appaiono con un'icona speciale nella casa d'aste.

  bulk-items:
    # Percentuale di oggetti generati che saranno oggetti in lotto (0-100)
    percentage: 15

    # Numero minimo di oggetti in un lotto
    min-items: 2

    # Numero massimo di oggetti in un lotto
    max-items: 27

  #============================================================
  # Configurazione delle Economie
  #============================================================
  # Quali economie usare per gli oggetti generati.

  economies:
    # Lista dei nomi delle economie da usare (deve corrispondere ai nomi in economies.yml)
    # Gli oggetti saranno assegnati casualmente a una di queste economie.
    # Se vuota, usa l'economia predefinita.
    list:
      - vault

    # Se true, distribuisce gli oggetti uniformemente tra le economie.
    # Se false, sceglie casualmente un'economia per ogni oggetto.
    even-distribution: false
