################################################################################################################################
#
#   zAuctionHouse V4 - Configuracion de Mensajes (Espanol)
#
#   Este archivo contiene todos los mensajes mostrados a los jugadores por el plugin.
#   Personaliza estos mensajes para adaptarlos al idioma y estilo de tu servidor.
#
#   FORMATO:
#   - Soporta el formato MiniMessage: <red>, <bold>, <gradient:red:blue>, etc.
#   - Soporta los colores hex: #RRGGBB o #RGB
#   - Soporta los codigos legacy: &c, &l, etc. (no recomendado, usa MiniMessage)
#   - Usa los atajos de color definidos en config.yml: <primary>, <secondary>, <error>, <success>
#
#   PLACEHOLDER:
#   - El estilo %placeholder% se usa para los valores dinamicos
#   - Los placeholders disponibles varian segun el mensaje (documentado en linea)
#
#   Documentacion: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# MENSAJES GENERALES
#=============================================================================

# Prefijo agregado antes de todos los mensajes del plugin.
# Establece una cadena vacia "" para desactivar el prefijo.
# Placeholders disponibles: ninguno
prefix: "<primary>zAuctionHouse <secondary>• "

#=============================================================================
# MENSAJES DE VERSION Y ACTUALIZACION
#=============================================================================

# Mostrado cuando hay una nueva version del plugin disponible (si version-checker esta activado).
# Placeholders disponibles:
#   %version% - Version actualmente instalada
#   %latest%  - Ultima version disponible
version-available: "<#ff0000>Hay una nueva version de zAuctionHouse disponible! <gray>(<white>actual: <#ff9900>%version% <gray>| <white>ultima: <#00ff00>%latest%<gray>)"

#=============================================================================
# MENSAJES DE COMANDOS
#=============================================================================

# Mostrado cuando un comando se usa incorrectamente.
# Placeholders disponibles:
#   %syntax% - Sintaxis correcta del comando
command-syntax-error: "<error>Debes ejecutar el comando asi<gray>: <success>%syntax%"

# Mostrado cuando el jugador no tiene permiso para un comando.
# Placeholders disponibles: ninguno
command-no-permission: "<error>No tienes permiso para ejecutar este comando."

# Mostrado cuando un comando reservado a jugadores se ejecuta desde la consola.
# Placeholders disponibles: ninguno
command-no-console: "<error>Solo un jugador puede ejecutar este comando."

# Mostrado cuando los argumentos del comando no coinciden con ningun subcomando valido.
# Placeholders disponibles: ninguno
command-no-arg: "<error>No se puede encontrar el comando con sus argumentos."

# Mostrado cuando un comando se usa en un contexto restringido (mundo prohibido, etc.).
# Placeholders disponibles: ninguno
command-restricted: "<error>No puedes usar este comando aqui."

# Formato para las entradas de ayuda de comandos.
# Placeholders disponibles:
#   %syntax%      - Sintaxis del comando
#   %description% - Descripcion del comando
command-syntax-help: "<white>%syntax% <dark_gray>» <gray>%description%"

#=============================================================================
# DESCRIPCIONES DE COMANDOS
#=============================================================================
# Descripciones mostradas en los menus de ayuda y autocompletado.
# Deben ser cortas y descriptivas.

command-description-auction: "Abrir la casa de subastas"
command-description-auction-sell: "Poner un objeto en venta"
command-description-auction-rent: "Poner un objeto en alquiler"
command-description-auction-bid: "Poner un objeto en subasta"
command-description-auction-reload: "Recargar los archivos de configuracion"
command-description-auction-admin: "Abrir las herramientas de administracion"
command-description-auction-admin-generate: "Generar objetos ficticios"
command-description-auction-admin-open: "Abrir los objetos en venta actuales"
command-description-auction-admin-forceopen: "Abrir cualquier inventario para un jugador"
command-description-auction-admin-history: "Abrir el historial de un jugador"
command-description-auction-admin-add: "Agregar un objeto a la casa de subastas"
command-description-auction-admin-cache: "Gestionar la cache de los jugadores"
command-description-auction-admin-cache-set: "Establecer un valor en la cache"
command-description-auction-admin-cache-clear: "Vaciar la cache de un jugador"
command-description-auction-admin-cache-show: "Mostrar la cache de un jugador"
command-description-auction-claim: "Cobrar el dinero pendiente de las ventas"
command-description-auction-page: "Abrir la casa de subastas en una pagina especifica"
command-description-auction-migrate: "Migrar datos desde otro plugin"

#=============================================================================
# MENSAJES DE INVENTARIO
#=============================================================================

# Mostrado cuando un archivo de inventario no se encuentra.
# Placeholders disponibles:
#   %inventory-name% - Nombre del inventario faltante
inventory-not-found: "<error>No se puede encontrar el inventario <white>%inventory-name%<error>."

#=============================================================================
# MENSAJES DE VENTA
#=============================================================================

# Mostrado cuando un jugador intenta vender nada (mano vacia).
# Placeholders disponibles: ninguno
sell-error-air: "<error>No puedes vender el vacio!"

# Mostrado cuando el objeto en la mano ha cambiado durante el proceso de venta.
# Placeholders disponibles: ninguno
sell-error-change: "<error>El objeto en tu mano ha cambiado, venta cancelada."

# Mostrado cuando el proveedor de economia especificado no existe.
# Placeholders disponibles:
#   %name% - Nombre de la economia especificada
sell-error-economy: "<error>No se puede encontrar la economia <white>%name%<error>."

# Mostrado durante la confirmacion de una venta sin objetos seleccionados (inventario de venta).
# Placeholders disponibles: ninguno
sell-inventory-empty: "<error>Debes colocar objetos en el inventario antes de confirmar."

# Mostrado cuando un jugador cancela el inventario de venta.
# Placeholders disponibles: ninguno
sell-inventory-cancelled: "<error>Has cancelado la venta, tus objetos han sido devueltos."

# Mostrado cuando los objetos seleccionados se eliminan del inventario de venta.
# Placeholders disponibles: ninguno
sell-items-cleared: "<success>Los objetos seleccionados han sido eliminados."

# Mostrado cuando un objeto se agrega a la lista de venta.
# Placeholders disponibles: ninguno
sell-item-added: "<success>Objeto agregado a la lista de venta."

# Mostrado cuando un objeto se elimina de la lista de venta.
# Placeholders disponibles: ninguno
sell-item-removed: "<success>Objeto eliminado de la lista de venta."

#=============================================================================
# MENSAJES ADMIN
#=============================================================================

# Mostrado cuando los comandos admin requieren un jugador objetivo pero ninguno fue especificado.
# Placeholders disponibles: ninguno
admin-target-required: "<error>Debes especificar un jugador objetivo valido."

# Mostrado cuando el jugador objetivo especificado no se encuentra.
# Placeholders disponibles:
#   %target% - Nombre especificado
admin-target-not-found: "<error>No se puede encontrar el jugador <white>%target%<error>."

# Mostrado durante la apertura de los objetos de un jugador como admin.
# Placeholders disponibles:
#   %type%   - Tipo de objetos (en venta, caducados, comprados)
#   %target% - Nombre del jugador objetivo
admin-open-inventory: "<success>Abriendo los objetos %type% para <white>%target%<success>."

# Mostrado durante la apertura forzada de un inventario como admin.
# Placeholders disponibles:
#   %inventory% - Nombre del inventario
#   %target%    - Nombre del jugador objetivo
#   %page%      - Número de página
admin-forceopen-inventory: "<success>Abriendo inventario <white>%inventory%<success> para <white>%target%<success> en la página <white>%page%<success>."

# Mostrado durante la apertura del historial de un jugador como admin.
# Placeholders disponibles:
#   %target% - Nombre del jugador objetivo
admin-open-history: "<success>Abriendo el historial para <white>%target%<success>."

# Mostrado cuando un admin elimina objetos de un jugador.
# Placeholders disponibles:
#   %items%  - Descripcion del objeto
#   %target% - Nombre del jugador objetivo
admin-item-removed: "<success>Has eliminado <white>%items%<success> de <white>%target%<success>."

# Mostrado cuando un admin agrega objetos a un jugador.
# Placeholders disponibles:
#   %items%  - Descripcion del objeto
#   %target% - Nombre del jugador objetivo
#   %type%   - Tipo de categoria (en venta, caducado, comprado)
admin-item-added: "<success>Has agregado <white>%items%<success> a <white>%target%<success> en <white>%type%<success>."

# Mostrado cuando un admin recoge con exito un objeto de los logs.
# Placeholders disponibles: ninguno
admin-item-retrieved: "<success>Objeto(s) recogido(s) con exito."

# Mostrado durante un intento de recoger desde una entrada de log sin objeto.
# Placeholders disponibles: ninguno
admin-no-item-to-retrieve: "<error>No hay objeto para recoger de esta entrada de log."

#=============================================================================
# MENSAJES DE RECARGA
#=============================================================================

# Mostrado cuando la configuracion del plugin se recarga.
# Placeholders disponibles: ninguno
reload-success: "<success>Acabas de recargar el plugin!"

#=============================================================================
# MENSAJES DE RECOGIDA DE OBJETOS
#=============================================================================
# Mostrado cuando los jugadores recogen objetos de diferentes inventarios.
# Placeholders disponibles:
#   %items% - Descripcion de los objetos recogidos

# Recogida de los anuncios activos
item-remove-listed: "#e6fff3Acabas de recoger %items% #e6fff3de los objetos en venta."

# Recogida de los objetos caducados
item-remove-expired: "#e6fff3Acabas de recoger %items% #e6fff3de los objetos caducados."

# Recogida de los objetos comprados
item-remove-purchased: "#e6fff3Acabas de recoger %items% #e6fff3de los objetos comprados."

# Recogida del inventario de tus objetos
item-remove-selling: "#e6fff3Acabas de recoger %items% #e6fff3de tus objetos."

#=============================================================================
# MENSAJES DE TRANSACCION
#=============================================================================

# Mostrado al vendedor cuando pone un objeto en venta.
# Placeholders disponibles:
#   %items% - Descripcion del objeto
#   %price% - Precio de venta
item-sold: "#e6fff3Acabas de poner en venta %items% #e6fff3por #92bed8%price%#e6fff3."

# Mostrado al vendedor cuando su objeto es comprado (si esta conectado).
# Placeholders disponibles:
#   %buyer% - Nombre del comprador
#   %items% - Descripcion del objeto
#   %price% - Precio de venta
item-bought-seller: "#ffacd5%buyer% #e6fff3acaba de comprar %items% #e6fff3por #92bed8%price%#e6fff3."

# Mostrado al comprador despues de comprar un objeto.
# Placeholders disponibles:
#   %items% - Descripcion del objeto
#   %price% - Precio de compra
item-bought-buyer: "#e6fff3Acabas de comprar %items% #e6fff3por #92bed8%price%#e6fff3."

#=============================================================================
# MENSAJES DE ERROR
#=============================================================================

# Mostrado cuando el jugador no tiene suficiente dinero para comprar.
# Placeholders disponibles: ninguno
not-enough-money: "<error>No tienes suficiente dinero para comprar esto."

# Mostrado cuando el inventario del jugador esta lleno (si la verificacion de espacio esta activada).
# Placeholders disponibles: ninguno
not-enough-space: "<error>No tienes suficiente espacio en tu inventario para comprar este objeto."

# Mostrado cuando el precio de venta supera el maximo permitido.
# Placeholders disponibles:
#   %max-price% - Precio maximo permitido
price-too-high: "<error>No puedes vender por mas de <white>%max-price%<error>."

# Mostrado cuando el precio de venta es inferior al minimo requerido.
# Placeholders disponibles:
#   %min-price% - Precio minimo requerido
price-too-low: "<error>No puedes vender por menos de <white>%min-price%<error>."

# Mostrado cuando el jugador ha alcanzado su limite de anuncios.
# Placeholders disponibles:
#   %max-items% - Numero maximo de objetos permitidos
listed-items-limit: "<error>No puedes vender mas de <white>%max-items%<error> objetos<error>. &8(&7Has configurado el permiso zauctionhouse.<numero en config.yml>?&8)"

# Mostrado durante un intento de venta en un mundo prohibido.
# Placeholders disponibles: ninguno
world-banned: "<error>No puedes vender objetos en este mundo."

# Mostrado durante un intento de venta de un objeto en la lista negra.
# Placeholders disponibles: ninguno
item-blacklisted: "<error>No puedes vender objetos en la lista negra."

# Mostrado durante un intento de venta de un objeto no presente en la lista blanca (si esta activada).
# Placeholders disponibles: ninguno
item-whitelisted: "<error>No puedes vender un objeto que no esta en la lista blanca."

#=============================================================================
# MENSAJES DE GENERACION ADMIN
#=============================================================================
# Mensajes para el comando de generacion de objetos ficticios (pruebas de rendimiento).

# Advertencia mostrada antes de generar objetos ficticios.
# Placeholders disponibles:
#   %amount% - Numero de objetos a generar
admin-generate-warning:
  - "<error>⚠ ADVERTENCIA ⚠"
  - "<error>Este comando generara <white>%amount%<error> objetos ficticios para pruebas de rendimiento."
  - "<error>Estos datos son <white>FICTICIOS<error> y deberan ser eliminados despues de las pruebas."
  - "<error>Ejecuta este comando de nuevo dentro de <white>30 segundos<error> para confirmar."

# Mostrado despues de la confirmacion de la generacion.
# Placeholders disponibles:
#   %amount% - Numero de objetos en proceso de generacion
admin-generate-confirmed: "<success>Generacion confirmada! Creando <white>%amount%<success> objetos..."

# Actualizacion del progreso durante la generacion.
# Placeholders disponibles:
#   %current% - Progreso actual
#   %total%   - Total de objetos a generar
admin-generate-progress: "<gray>Progreso: <white>%current%<gray>/<white>%total%<gray> objetos creados..."

# Mostrado cuando la generacion se completa.
# Placeholders disponibles:
#   %amount% - Numero de objetos generados
#   %time%   - Tiempo empleado en milisegundos
admin-generate-complete: "<success>Generacion exitosa de <white>%amount%<success> objetos en <white>%time%ms<success>."

# Mostrado cuando no se encuentra ningun material valido para la generacion.
# Placeholders disponibles: ninguno
admin-generate-no-materials: "<error>Ningun material valido encontrado en las categorias. Asegurate de tener categorias diferentes a 'misc' configuradas."

# Mostrado cuando se especifica una cantidad no valida.
# Placeholders disponibles: ninguno
admin-generate-invalid-amount: "<error>Cantidad no valida. Especifica un numero entre <white>1<error> y <white>100000<error>."

# Mostrado al inicio de la generacion de jugadores ficticios.
# Placeholders disponibles:
#   %total% - Numero total de jugadores a generar
admin-generate-players-start: "<gray>Registrando <white>%total%<gray> jugadores unicos..."

# Actualizacion del progreso durante la generacion de jugadores.
# Placeholders disponibles:
#   %current% - Progreso actual
#   %total%   - Total de jugadores a generar
admin-generate-players-progress: "<gray>Jugadores registrados: <white>%current%<gray>/<white>%total%<gray>..."

# Mostrado cuando la generacion de jugadores se completa.
# Placeholders disponibles:
#   %amount% - Numero de jugadores generados
admin-generate-players-complete: "<success>Registro exitoso de <white>%amount%<success> jugadores unicos."

# Mostrado al inicio de la generacion de objetos ficticios.
# Placeholders disponibles:
#   %total% - Numero total de objetos a generar
admin-generate-items-start: "<gray>Creando <white>%total%<gray> objetos de subasta..."

#=============================================================================
# MENSAJES DE CACHE ADMIN
#=============================================================================
# Mensajes para los comandos de gestion de cache.

# Encabezado para la visualizacion de la cache.
# Placeholders disponibles:
#   %player% - Nombre del jugador
admin-cache-show-header: "<primary>Cache para <white>%player%<primary>:"

# Formato para cada entrada de la cache.
# Placeholders disponibles:
#   %key%   - Nombre de la clave de cache
#   %value% - Valor de la cache
admin-cache-show-entry: "<gray>  %key% <dark_gray>» <white>%value%"

# Mostrado cuando la cache esta vacia.
# Placeholders disponibles: ninguno
admin-cache-show-empty: "<gray>  Ninguna entrada de cache encontrada."

# Mostrado durante la eliminacion de una clave de cache especifica.
# Placeholders disponibles:
#   %key%    - Nombre de la clave de cache
#   %player% - Nombre del jugador
admin-cache-cleared: "<success>Clave de cache <white>%key%<success> eliminada para <white>%player%<success>."

# Mostrado durante la eliminacion de toda la cache de un jugador.
# Placeholders disponibles:
#   %player% - Nombre del jugador
admin-cache-cleared-all: "<success>Toda la cache eliminada para <white>%player%<success>."

# Mostrado durante la eliminacion de una clave de cache para todos los jugadores.
# Placeholders disponibles:
#   %key%   - Nombre de la clave de cache
#   %count% - Numero de jugadores afectados
admin-cache-cleared-all-players: "<success>Clave de cache <white>%key%<success> eliminada para <white>%count%<success> jugadores."

# Mostrado durante la eliminacion de toda la cache para todos los jugadores.
# Placeholders disponibles:
#   %count% - Numero de jugadores afectados
admin-cache-cleared-all-players-all: "<success>Toda la cache eliminada para <white>%count%<success> jugadores."

# Mostrado durante la configuracion de un valor de cache.
# Placeholders disponibles:
#   %key%    - Nombre de la clave de cache
#   %value%  - Nuevo valor
#   %player% - Nombre del jugador
admin-cache-set: "<success>Establecido <white>%key%<success> a <white>%value%<success> para <white>%player%<success>."

# Mostrado durante la configuracion de un valor de cache para todos los jugadores.
# Placeholders disponibles:
#   %key%   - Nombre de la clave de cache
#   %value% - Nuevo valor
#   %count% - Numero de jugadores afectados
admin-cache-set-all-players: "<success>Establecido <white>%key%<success> a <white>%value%<success> para <white>%count%<success> jugadores."

# Mostrado cuando se especifica una clave de cache no valida.
# Placeholders disponibles:
#   %key% - Nombre de clave no valido
admin-cache-invalid-key: "<error>Clave de cache no valida <white>%key%<error>. Usa el autocompletado para las claves validas."

# Mostrado cuando se especifica un valor no valido para una clave de cache.
# Placeholders disponibles:
#   %value% - Valor no valido
#   %key%   - Nombre de la clave de cache
admin-cache-invalid-value: "<error>Valor no valido <white>%value%<error> para la clave <white>%key%<error>."

# Mostrado durante un intento de configuracion de una clave de cache de solo lectura.
# Placeholders disponibles:
#   %key% - Nombre de la clave de cache
admin-cache-key-not-settable: "<error>La clave de cache <white>%key%<error> no puede ser configurada por comando."

# Mostrado durante la seleccion de un jugador desconectado para las operaciones de cache.
# Placeholders disponibles:
#   %player% - Nombre del jugador
admin-cache-player-not-online: "<error>El jugador <white>%player%<error> no esta conectado."

#=============================================================================
# MENSAJES DE COBRO
#=============================================================================
# Mensajes para el sistema de cobro del dinero pendiente.

# Mostrado cuando el jugador no tiene dinero pendiente para cobrar.
# Placeholders disponibles: ninguno
claim-no-pending: "<error>No tienes dinero pendiente para cobrar."

# Mostrado cuando el dinero se cobra con exito.
# Placeholders disponibles: ninguno
claim-success: "<success>Has cobrado tu dinero pendiente con exito!"

# Mostrado para cada economia durante el cobro (si varias economias tienen dinero pendiente).
# Placeholders disponibles:
#   %amount%  - Cantidad cobrada
#   %economy% - Nombre de la economia
claim-economy-success: "<success>Has recibido <white>%amount%<success> de <white>%economy%<success>."

# Notificacion mostrada cuando el jugador tiene dinero pendiente (al conectarse).
# Placeholders disponibles:
#   %amount% - Cantidad total pendiente
claim-pending-notify: "#e6fff3Tienes dinero pendiente! Usa <white>/ah claim<#e6fff3> para recibir <white>%amount%<#e6fff3>."

#=============================================================================
# NOTIFICACION DE VENTAS
#=============================================================================
# Mensajes mostrados cuando un jugador se conecta y ha vendido objetos durante su ausencia.
# Es un mensaje clicable que abre el historial de ventas.

# Placeholders disponibles:
#   %count% - Numero de objetos vendidos
#   %total% - Ganancias totales de las ventas
sales-notification:
  - "<click:run_command:/ah history>#e6fff3Durante tu ausencia, <white>%count%<#e6fff3> de tus objetos fueron vendidos por un total de <white>%total%<#e6fff3>!"
  - "<click:run_command:/ah history>#8c8c8c• #2CCED2Haz clic aqui<#92ffff> para ver tu historial de ventas</click>"

#=============================================================================
# MENSAJES DE IMPUESTOS
#=============================================================================
# Mensajes relacionados con el sistema de impuestos (si esta activado en economies.yml).

# Mostrado al vendedor cuando se aplica el impuesto de puesta en venta.
# Placeholders disponibles:
#   %tax%        - Cantidad del impuesto
#   %percentage% - Porcentaje del impuesto
tax-sell-applied: "<gray>Un impuesto de <white>%tax%<gray> (%percentage%%) ha sido aplicado a esta venta."

# Mostrado cuando el impuesto de compra se deduce de las ganancias del vendedor.
# Placeholders disponibles:
#   %tax%        - Cantidad del impuesto
#   %percentage% - Porcentaje del impuesto
tax-purchase-applied: "<gray>Un impuesto de <white>%tax%<gray> (%percentage%%) ha sido aplicado a esta compra."

# Mostrado al comprador cuando se aplica el IVA (el comprador paga mas).
# Placeholders disponibles:
#   %tax%        - Cantidad del impuesto
#   %percentage% - Porcentaje del impuesto
tax-capitalism-info: "<gray>El precio incluye <white>%tax%<gray> de IVA (%percentage%%)."

# Mostrado cuando el jugador esta exento de impuestos.
# Placeholders disponibles: ninguno
tax-exempt: "<green>Estas exento de impuestos."

# Mostrado cuando el jugador tiene una tasa impositiva reducida.
# Placeholders disponibles:
#   %percentage% - Porcentaje de impuesto reducido
tax-reduced: "<green>Te beneficias de una tasa impositiva reducida (%percentage%%)."

# Mostrado cuando el jugador no puede pagar el impuesto.
# Placeholders disponibles:
#   %tax% - Cantidad del impuesto requerida
tax-insufficient-funds: "<error>No tienes suficiente dinero para pagar el impuesto de <white>%tax%<error>."

#=============================================================================
# MENSAJES DE MIGRACION
#=============================================================================
# Mensajes para el sistema de migracion de datos (importacion desde otros plugins).
# Uso: /ah admin migrate <fuente> confirm
# Fuentes soportadas: zauctionhousev3

# Mostrado cuando la migracion no esta configurada.
# Placeholders disponibles:
#   %source% - Nombre de la fuente de migracion
migration-not-configured: "<error>La migracion para <white>%source%<error> no esta configurada. Configura la seccion <white>migration<error> en config.yml."

# Mostrado cuando se especifica una fuente de migracion desconocida.
# Placeholders disponibles:
#   %source% - Nombre de fuente no valido
migration-invalid-source: "<error>Fuente de migracion desconocida: <white>%source%"

# Mostrado para listar las fuentes de migracion disponibles.
# Placeholders disponibles:
#   %sources% - Lista de fuentes validas separadas por comas
migration-available-sources: "<gray>Fuentes disponibles: %sources%"

# Informacion sobre la migracion antes de la confirmacion.
# Placeholders disponibles:
#   %source%  - Nombre de la fuente de migracion
#   %details% - Detalles de la configuracion de migracion
migration-info:
  - "<primary>Migracion desde <white>%source%"
  - "<gray>Detalles: <white>%details%"

# Solicitud de confirmacion de la migracion.
# Placeholders disponibles:
#   %source% - Nombre de la fuente de migracion
migration-confirm:
  - "<gray>Ejecuta <white>/ah admin migrate %source% confirm<gray> para iniciar la migracion."
  - "<error>⚠ ADVERTENCIA: Esto importara datos en V4. Asegurate de hacer una copia de seguridad de tus datos antes!"

# Mostrado cuando la migracion comienza.
# Placeholders disponibles:
#   %source% - Nombre de la fuente de migracion
migration-started: "<success>Migracion desde <white>%source%<success> iniciada... Puede tardar un poco."

# Actualizaciones de progreso durante la migracion.
# Placeholders disponibles:
#   %progress% - Mensaje de progreso actual
migration-progress: "<gray>[Migracion] %progress%"

# Mostrado cuando la migracion termina con exito.
# Placeholders disponibles:
#   %source%       - Nombre de la fuente de migracion
#   %players%      - Numero de jugadores migrados
#   %items%        - Numero de objetos migrados
#   %transactions% - Numero de transacciones migradas
#   %errors%       - Numero de errores encontrados
#   %duration%     - Tiempo empleado en milisegundos
migration-success:
  - "<success>Migracion desde <white>%source%<success> completada con exito!"
  - "<gray>  Jugadores: <white>%players%"
  - "<gray>  Objetos: <white>%items%"
  - "<gray>  Transacciones: <white>%transactions%"
  - "<gray>  Errores: <white>%errors%"
  - "<gray>  Duracion: <white>%duration%ms"

# Mostrado cuando la migracion falla.
# Placeholders disponibles:
#   %error% - Mensaje de error
migration-failed: "<error>La migracion ha fallado: <white>%error%"

