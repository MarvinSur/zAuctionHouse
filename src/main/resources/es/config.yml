#=============================================================================
# OBJETOS ESPECIALES
#=============================================================================

# Objetos de visualizacion especiales usados en la interfaz de la casa de subastas.
# Reemplazan la vista previa real del objeto para casos especiales.

special-items:
  # Objeto de visualizacion para las ventas en lote (varios objetos en un anuncio)
  # Este icono de cofre indica que al hacer clic se mostrara el contenido.
  auction-item:
    material: CHEST
    name: "#00ff00Venta en lote"

#=============================================================================
# FORMATO DE VISUALIZACION DE OBJETOS
#=============================================================================

# Configuracion para la visualizacion de objetos en los mensajes y en el lore.
# Usado para mostrar los nombres de los objetos en los mensajes de chat y en las notificaciones.

item-display:
  # Formato para los objetos que usan las claves de traduccion de Minecraft
  # Usado cuando el objeto tiene una clave de traduccion (la mayoria de los objetos vanilla)
  # Placeholder: %amount%, %item-translation-key%
  lang: "#8ee6e3x%amount% &7<lang:%item-translation-key%>"

  # Formato para los objetos con nombres de visualizacion personalizados
  # Usado cuando el objeto tiene un nombre personalizado definido por plugins o yunques
  # Placeholder: %amount%, %item-name%
  item-name: "#8ee6e3x%amount% &7%item-name%"

  # Separador usado entre los ultimos dos objetos de una lista
  # Ejemplo: "Diamante, Oro y Esmeralda"
  and: " &fy "

  # Separador usado entre los objetos de una lista (excepto los ultimos dos)
  # Ejemplo: "Diamante, Oro, Hierro"
  between: "&f, "

  # Cuando esta activado, los objetos similares se fusionan en la visualizacion
  # Ejemplo: "3x Diamante" en lugar de "Diamante, Diamante, Diamante"
  merge-similar-items: true

#=============================================================================
# FORMATO DE TIEMPO
#=============================================================================

# Etiquetas de unidades de tiempo y formatos de visualizacion para cuentas regresivas y duraciones.
# Usado en todo el plugin para los temporizadores de caducidad, tiempo restante, etc.

time:
  # Etiquetas de unidades de tiempo (formas singular y plural)
  second: segundo
  seconds: segundos

  minute: minuto
  minutes: minutos

  hour: hora
  hours: horas

  day: dia
  days: dias

  # Cadenas de formato de tiempo usando placeholders estilo printf
  # %02d = Numero completado a 2 digitos (ej: 01, 05, 12)
  # %second%, %minute%, %hour%, %day% = Unidad dinamica segun la cantidad
  #
  # Formato para duraciones >= 1 dia
  # Ejemplo de salida: "02ŠīÖ 05 ú 30Šīć"
  time-day: '%02dŠīÖ %02d ú %02dŠīć'

  # Formato para duraciones >= 1 hora pero < 1 dia
  # Ejemplo de salida: "05 ú 30Šīć 45s"
  time-hour: '%02d ú %02dŠīć %02ds'

  # Formato para duraciones >= 1 minuto pero < 1 hora
  # Ejemplo de salida: "30Šīć 45s"
  time-minute: '%02dŠīć %02ds'

  # Formato para duraciones < 1 minuto
  # Ejemplo de salida: "45s"
  time-second: '%02ds'

#=============================================================================
# COMPORTAMIENTO DE LAS ACCIONES
#=============================================================================

# Configuracion del comportamiento de las diferentes acciones en el plugin.
# Controla lo que sucede despues de compras, retiradas y otras operaciones.

action:
  # Cuando esta activado, el inventario de subastas se actualiza automaticamente al agregar/eliminar objetos.
  # Desactivar si se experimentan problemas de rendimiento con actualizaciones frecuentes.
  update-inventory-on-action: true

  # Cuando esta activado, el filtro de categoria se restablece cada vez que un jugador abre la casa de subastas.
  # Cuando esta desactivado, la categoria seleccionada anteriormente persiste entre aperturas.
  reset-category-on-open: true

  # Cuando esta activado, el filtro de busqueda se restablece cada vez que un jugador abre la casa de subastas.
  # Cuando esta desactivado, la busqueda ingresada anteriormente persiste entre aperturas.
  reset-search-on-open: true

  # Comportamiento durante la retirada de un objeto de los anuncios activos (el vendedor cancela la venta)
  remove-listed-item:
    # Si es true, el objeto se da inmediatamente al inventario del jugador
    # Si es false, el objeto va a la seccion "objetos caducados" para la retirada posterior
    give-item: false

    # Si es true, reabre el inventario de subastas despues de la retirada del objeto
    open-inventory: true

    # Si es true, muestra un GUI de confirmacion antes de retirar el objeto
    # Recomendado: Activar para evitar retiradas accidentales
    open-confirm-inventory: true

  # Comportamiento durante la retirada de los objetos caducados
  remove-expired-item:
    # Si es true, reabre el inventario de objetos caducados despues de la retirada
    open-inventory: true

    # Si es true, el jugador debe tener espacio libre en su inventario para retirar el objeto
    # Si es false y no hay espacio disponible, el objeto se tirara al suelo
    player-inventory-must-have-free-space: true

  # Comportamiento durante la compra de los objetos
  purchased-item:
    # Si es true, los objetos comprados se dan inmediatamente al inventario del comprador
    # Si es false, los objetos van a la seccion "objetos comprados" para la retirada posterior
    give-item: false

    # Si give-item es true, esto verifica si el jugador tiene suficiente espacio en su inventario
    # Si es false y no hay espacio disponible, la compra se bloquea
    player-inventory-must-have-free-space: true

    # Si es true, reabre el inventario de subastas despues de la compra
    open-inventory: true

    # Retroalimentacion visual cuando el jugador no tiene suficiente dinero
    money-item:
      # Activar o desactivar la retroalimentacion visual
      enable: true
      # Duracion en ticks para mostrar el objeto de error (20 ticks = 1 segundo)
      duration: 60
      # Objeto mostrado en lugar de la compra cuando los fondos son insuficientes
      item:
        material: BARRIER
        name: "#ff3535‚úė No tienes suficiente dinero para comprar esto!"

    # Si es true, envia un mensaje en chat cuando el jugador no puede pagar
    money-message: true

    # Sonido reproducido cuando el jugador no puede pagar
    money-sound:
      enable: true
      # Categoria del sonido (afecta los controles de volumen)
      category: MASTER
      # Identificador del sonido de Minecraft
      sound: minecraft:entity.villager.no
      # Nivel de volumen (0.0 a 1.0)
      volume: 1
      # Tono (0.5 a 2.0, 1.0 es normal)
      pitch: 1

  # Comportamiento durante la retirada de los objetos del inventario "tus objetos" (en venta)
  selling-item:
    # Si es true, reabre el inventario de objetos en venta despues de la retirada
    open-inventory: true

    # Si es true, el jugador debe tener espacio libre en su inventario para retirar el objeto
    # Si es false y no hay espacio disponible, el objeto se tirara al suelo
    player-inventory-must-have-free-space: true

#=============================================================================
# CONFIGURACION DEL AUTO-RECLAMO
#=============================================================================

# Reclamo automatico de dinero para las ventas offline.
# Cuando un objeto de un jugador se vende durante su ausencia, el dinero se almacena como "pendiente".
# Esta configuracion controla como se gestiona el dinero pendiente.

auto-claim:
  # Si es true, el dinero pendiente se deposita automaticamente cuando el jugador se conecta
  # Si es false, los jugadores deben ejecutar manualmente /ah claim para recibir su dinero
  enable: true

  # Retraso en ticks antes del auto-reclamo al conectarse (20 ticks = 1 segundo)
  # Esto da tiempo al jugador para cargarse completamente antes de las transacciones.
  # Establecer a 0 para reclamo inmediato (no recomendado).
  delay-ticks: 20

  # Si es true, envia un mensaje al jugador cuando su dinero se auto-reclama
  notify-player: true

  # Si el auto-reclamo esta desactivado, esta opcion notifica al jugador del dinero pendiente
  # Util para recordar a los jugadores de reclamar sus ganancias
  notify-pending: true

  # Retraso antes de enviar la notificacion del dinero pendiente
  notify-delay-ticks: 40

  # Cadena de motivo pasada al plugin de economia para la transaccion
  # Puede aparecer en los logs de economia o en el historial de transacciones
  deposit-reason: "Dinero de subastas reclamado"

#=============================================================================
# CONFIGURACION DEL HISTORIAL
#=============================================================================

# Controla el historial de ventas mostrado a los jugadores via /ah history.
# Util para limitar la carga de la base de datos en servidores con muchas transacciones.

history:
  # Numero maximo de entradas de historial mostradas por jugador.
  # Establecer a 0 para ilimitado (no recomendado para servidores grandes).
  max-entries: 500

  # Numero de dias despues de los cuales las entradas del historial ya no se muestran.
  # Establecer a 0 para mantener todo el historial indefinidamente.
  # Ejemplo: 90 = solo mostrar ventas de los ultimos 3 meses.
  expire-after-days: 0

#=============================================================================
# NOTIFICACION DE VENTA
#=============================================================================

# Notificaciones enviadas a los jugadores sobre los objetos vendidos durante su ausencia.
# Informa a los vendedores de sus ventas exitosas cuando se reconectan.

sales-notification:
  # Si es true, los jugadores reciben un resumen de las ventas offline al conectarse
  enable: true

  # Retraso en ticks antes de enviar la notificacion (20 ticks = 1 segundo)
  # Valores mas altos permiten que otros mensajes de conexion aparezcan antes.
  delay-ticks: 60

#=============================================================================
# CONFIGURACION DE DIFUSION
#=============================================================================

# Difundir mensajes a todos los jugadores en linea cuando se listan o compran objetos.
# Los jugadores pueden desactivarlo individualmente usando /ah option.

broadcast:
  sell:
    enable: false
    exclude-seller: true
  purchase:
    enable: false
    exclude-buyer: true
  # Mensajes personalizados por categor√≠a (formato MiniMessage).
  # Si un objeto pertenece a una categor√≠a listada aqu√≠, se usa el mensaje
  # personalizado en lugar del mensaje por defecto de messages.yml.
  # La clave de categor√≠a debe coincidir con un ID definido en categories.yml.
  # Placeholders disponibles: %seller%, %buyer%, %items%, %price%, %category%
  #
  # Ejemplo:
  #   category-messages:
  #     sell:
  #       weapons: "<red><bold>ARMA</bold></red> <white>%seller% <yellow>puso a la venta %items% <yellow>por <gold>%price%<yellow>!"
  #       armor: "<blue><bold>ARMADURA</bold></blue> <white>%seller% <yellow>puso a la venta %items% <yellow>por <gold>%price%<yellow>!"
  #       enchanted-books: "<light_purple><bold>ENCANT</bold></light_purple> <white>%seller% <yellow>puso a la venta %items% <yellow>por <gold>%price%<yellow>!"
  #     purchase:
  #       weapons: "<red><bold>ARMA</bold></red> <white>%buyer% <yellow>compr√≥ %items% <yellow>de <white>%seller% <yellow>por <gold>%price%<yellow>!"
  #       armor: "<blue><bold>ARMADURA</bold></blue> <white>%buyer% <yellow>compr√≥ %items% <yellow>de <white>%seller% <yellow>por <gold>%price%<yellow>!"
  #       enchanted-books: "<light_purple><bold>ENCANT</bold></light_purple> <white>%buyer% <yellow>compr√≥ %items% <yellow>de <white>%seller% <yellow>por <gold>%price%<yellow>!"
  category-messages:
    sell: {}
    purchase: {}

#=============================================================================
# CONFIGURACION DE RENDIMIENTO
#=============================================================================

# Configuracion avanzada de rendimiento para casas de subastas grandes.
# Estas configuraciones controlan el cache, procesamiento paralelo y timeouts.
# La mayoria de los servidores no necesitaran cambiar estos valores predeterminados.

performance:
  # Configuracion de cache para listas de objetos ordenados.
  # El cache pre-ordena los objetos para proporcionar acceso O(1) para la paginacion.
  cache:
    # Numero minimo de objetos antes de usar ordenamiento paralelo (Arrays.parallelSort).
    # El ordenamiento paralelo mejora el rendimiento para grandes conjuntos de datos pero tiene sobrecarga para los pequenos.
    # Recomendado: 10000 para la mayoria de los servidores. Reducir si tienes muchos nucleos de CPU disponibles.
    parallel-sort-threshold: 10000

    # Numero minimo de objetos antes de procesar categorias en paralelo.
    # Las categorias se procesan simultaneamente cuando se supera este umbral.
    # Recomendado: 5000 para la mayoria de los servidores.
    parallel-category-threshold: 5000

    # Numero de hilos a usar para el procesamiento paralelo.
    # Establecer en -1 para deteccion automatica (usa procesadores disponibles - 1, minimo 2).
    # Establecer un numero especifico para anular la deteccion automatica.
    parallelism: -1

  # Configuracion de timeout para operaciones de cluster (configuraciones multi-servidor).
  # Estos timeouts evitan que las operaciones se queden colgadas indefinidamente.
  # Todos los valores estan en milisegundos.
  cluster-timeout:
    # Timeout para verificar la disponibilidad de un objeto en los servidores.
    check-availability-ms: 5000

    # Timeout para adquirir un bloqueo en un objeto.
    lock-item-ms: 5000

    # Timeout para liberar un bloqueo en un objeto.
    unlock-item-ms: 3000

    # Timeout para notificar a otros servidores sobre cambios de estado.
    notify-status-change-ms: 3000

    # Timeout para notificar a otros servidores sobre compras/eliminaciones de objetos.
    notify-item-action-ms: 5000

#=============================================================================
# CONFIGURACION DE ORDENACION
#=============================================================================

# Opciones de ordenacion de objetos para la visualizacion de la casa de subastas.
# Controla como se ordenan los objetos durante la visualizacion de los anuncios.

sort-items:
  # Tipo de ordenacion predeterminado aplicado cuando un jugador abre la casa de subastas por primera vez
  # Opciones: ASCENDING_PRICE, ASCENDING_DATE, DECREASING_DATE, DECREASING_PRICE
  default-sort: DECREASING_DATE

  # Nombres de visualizacion para cada tipo de ordenacion en el GUI
  translations:
    ASCENDING_PRICE: "Šīė ÄŠīáŠīĄ…™ŠīŹ ŠīĄ ÄŠīáŠīĄ…™Šīá…īŠīõŠīá"      # Mas barato primero
    ASCENDING_DATE: "ÍúįŠīáŠīĄ úŠīÄ ŠīĄ ÄŠīáŠīĄ…™Šīá…īŠīõŠīá"       # Mas antiguo primero
    DECREASING_DATE: "ÍúįŠīáŠīĄ úŠīÄ ŠīÖŠīáŠīĄ ÄŠīáŠīĄ…™Šīá…īŠīõŠīá"     # Mas reciente primero
    DECREASING_PRICE: "Šīė ÄŠīáŠīĄ…™ŠīŹ ŠīÖŠīáŠīĄ ÄŠīáŠīĄ…™Šīá…īŠīõŠīá"   # Mas caro primero

#=============================================================================
# CONFIGURACION DE FILTROS DE BUSQUEDA
#=============================================================================

# Configura los operadores de filtros de busqueda usados en el sistema de busqueda.
# Cada tipo de filtro corresponde a un operador que los jugadores escriben en la barra de busqueda.
#
# Ejemplo: "seller = Notch", "name ~ Diamond", "material ~= sword"
#
# ADVERTENCIA: Los operadores deben ser unicos. Evita operadores que sean prefijos de otros
# (ej: "=" y "==" funcionan porque los operadores mas largos se verifican primero).

search-filters:
  # Contiene (sensible a mayusculas): campo ~ valor
  CONTAINS: "~"
  # Coincidencia exacta (sensible a mayusculas): campo = valor
  EQUALS: "="
  # Contiene (sin distinguir mayusculas): campo ~= valor
  CONTAINS_IGNORE_CASE: "~="
  # Coincidencia exacta (sin distinguir mayusculas): campo == valor
  EQUALS_IGNORE_CASE: "=="

################################################################################################################################
# MIGRACION DESDE OTROS PLUGINS
################################################################################################################################
# Esta seccion permite migrar datos desde otros plugins de subastas a zAuctionHouse V4.
#
# COMO MIGRAR:
# 1. Configura la seccion fuente apropiada a continuacion con los ajustes de BD de tu antiguo plugin
# 2. Detiene el servidor y haz una copia de seguridad de todos los datos (CRITICO!)
# 3. Inicia el servidor con zAuctionHouse V4
# 4. Ejecuta: /ah admin migrate <fuente> confirm
#
# FUENTES SOPORTADAS:
#   - zauctionhousev3 (alias: zah, zahv3, v3)
#
# ATENCION: Siempre haz una copia de seguridad de tus datos antes de migrar! La migracion no puede deshacerse.

migration:

  #============================================================
  # Migracion zAuctionHouse V3
  #============================================================
  # Migra los datos de zAuctionHouse V3 a V4.
  # Comando: /ah admin migrate zauctionhousev3 confirm
  zauctionhouse-v3:
    # Tipo de almacenamiento fuente de V3
    # Opciones: MYSQL, MARIADB, SQLITE, o JSON
    source-type: SQLITE

    # Prefijo de tabla usado en tu instalacion V3
    # Verifica tu config.yml V3 si no estas seguro (el predeterminado era "zauctionhouse_")
    table-prefix: "zauctionhouse_"

    # === Configuracion SQLite ===
    # Ruta al archivo de base de datos SQLite V3 (relativa a la raiz del servidor)
    sqlite-path: "plugins/zAuctionHousev3/database.db"

    # === Configuracion MySQL/MariaDB ===
    # Necesario solo si source-type es MYSQL o MARIADB
    host: "localhost"
    port: 3306
    database: "zauctionhouse"
    user: "root"
    password: ""

    # === Configuracion JSON ===
    # Ruta a la carpeta de datos V3 que contiene los archivos de almacenamiento JSON
    json-folder: "plugins/zAuctionHouseV3"

  #============================================================
  # Futuras Fuentes de Migracion
  #============================================================
  # Fuentes de migracion adicionales seran agregadas en futuras actualizaciones.
  # Ejemplos:
  # axauctions:
  #   source-type: SQLITE
  #   sqlite-path: "plugins/AxAuctions/data.db"

################################################################################################################################
# CONFIGURACION ADMIN GENERATE
################################################################################################################################
# Configuracion para el comando /ah admin generate.
# Este comando crea objetos ficticios para pruebas de rendimiento.
#
# USO: /ah admin generate <cantidad>
#
# ATENCION: Los objetos generados son SOLO para PRUEBAS. Eliminalos despues de probar.

admin-generate:

  #============================================================
  # Configuracion del Tiempo de Caducidad
  #============================================================
  # Controla el tiempo de caducidad de los objetos generados.

  expiration:
    # Modo: FIXED o RANDOM
    # FIXED: Todos los objetos usan el valor 'fixed'
    # RANDOM: Los objetos obtienen un valor aleatorio entre 'min' y 'max'
    mode: RANDOM

    # Tiempo de caducidad fijo en segundos (usado cuando mode es FIXED)
    fixed: 172800  # 2 dias

    # Tiempo de caducidad minimo en segundos (usado cuando mode es RANDOM)
    min: 3600      # 1 hora

    # Tiempo de caducidad maximo en segundos (usado cuando mode es RANDOM)
    max: 604800    # 7 dias

  #============================================================
  # Configuracion del Precio
  #============================================================
  # Controla el precio de los objetos generados.

  price:
    # Modo: FIXED o RANDOM
    mode: RANDOM

    # Precio fijo (usado cuando mode es FIXED)
    fixed: 1000

    # Precio minimo (usado cuando mode es RANDOM)
    min: 10

    # Precio maximo (usado cuando mode es RANDOM)
    max: 1000000

  #============================================================
  # Configuracion de la Cantidad de Objetos
  #============================================================
  # Controla el tamano del stack de los objetos generados.

  item-amount:
    # Modo: FIXED o RANDOM
    mode: RANDOM

    # Cantidad fija (usado cuando mode es FIXED)
    # Sera limitada al tamano max del stack del objeto
    fixed: 1

    # Cantidad minima (usado cuando mode es RANDOM)
    min: 1

    # Cantidad maxima (usado cuando mode es RANDOM)
    # Usa -1 para usar el tamano max del stack del objeto como maximo
    max: -1

  #============================================================
  # Configuracion de Objetos en Lote
  #============================================================
  # Los objetos en lote son anuncios con multiples objetos (como cajas shulker).
  # Aparecen con un icono especial en la casa de subastas.

  bulk-items:
    # Porcentaje de objetos generados que seran objetos en lote (0-100)
    percentage: 15

    # Numero minimo de objetos en un lote
    min-items: 2

    # Numero maximo de objetos en un lote
    max-items: 27

  #============================================================
  # Configuracion de Economias
  #============================================================
  # Que economias usar para los objetos generados.

  economies:
    # Lista de nombres de economias a usar (debe coincidir con los nombres en economies.yml)
    # Los objetos seran asignados aleatoriamente a una de estas economias.
    # Si esta vacia, usa la economia predeterminada.
    list:
      - vault

    # Si true, distribuye los objetos uniformemente entre las economias.
    # Si false, elige aleatoriamente una economia para cada objeto.
    even-distribution: false
