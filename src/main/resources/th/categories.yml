################################################################################################################################
#
#   zAuctionHouse V4 - การตั้งค่าหมวดหมู่ (Categories Configuration)
#
#   ไฟล์นี้ใช้กำหนดหมวดหมู่ไอเท็มสำหรับจัดระเบียบใน auction house
#   หมวดหมู่จะช่วยให้ผู้เล่นค้นหา/กรองไอเท็มตามประเภทได้ง่ายขึ้น
#
#   วิธีการทำงานของหมวดหมู่ (HOW CATEGORIES WORK):
#   - แต่ละหมวดหมู่จะมี ID เฉพาะ (คือ key ใน YAML เช่น "weapons", "armor")
#   - หมวดหมู่ใช้ "rules" เพื่อกำหนดว่าไอเท็มไหนอยู่ในหมวดนั้น
#   - ไอเท็มจะถูกจัดลงหมวดโดยอัตโนมัติตามกฎที่ตั้งไว้
#   - ไอเท็ม 1 ชิ้นสามารถอยู่หลายหมวดได้ หากตรงกับหลายกฎ
#   - หมวด "misc" (หรือหมวดที่ไม่มี rules) จะทำหน้าที่เป็น fallback สำหรับของที่ไม่เข้าเงื่อนไขอื่น
#
#   ลำดับหมวดหมู่ (CATEGORY ORDER):
#   - ลำดับที่หมวดหมู่แสดงใน GUI จะถูกกำหนดในไฟล์ inventories/categories.yml
#   - ไฟล์นี้จะกำหนดแค่ "กฎ" ไม่ได้กำหนดลำดับการแสดงผล
#
#   ประเภท RULE (ดูรายละเอียดเต็มใน rules.yml):
#   - material         : แมตช์ตามชื่อ material ของ Minecraft
#   - material-suffix  : แมตช์ material ที่ลงท้ายด้วย suffix
#   - tag              : แมตช์ตาม Bukkit/Paper item tag
#   - name             : แมตช์ตาม display name ของไอเท็ม
#   - lore             : แมตช์ตามข้อความใน lore
#   - custom-model-data: แมตช์ตามค่า CustomModelData
#   - and/or           : รวมหลายกฎเข้าด้วยกัน
#   - กฎปลั๊กอิน custom item ต่าง ๆ (itemsadder, oraxen, mmoitems ฯลฯ)
#
#   Documentation: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# CATEGORY SETTINGS (การตั้งค่าหมวดหมู่)
#=============================================================================

settings:
  # เปิดหรือปิดระบบหมวดหมู่ทั้งหมด
  # ถ้าปิด ไอเท็มทั้งหมดจะแสดงรวมกัน ไม่มีตัวเลือกกรองตามหมวด
  # จะเหลือเฉพาะมุมมอง "All" ให้เลือก
  enabled: true

  # ชื่อที่แสดงสำหรับหมวด "All" (แสดงไอเท็มทั้งหมดทุกประเภท)
  # หมวดนี้มีอยู่เสมอและจะแสดงไอเท็มทุกชิ้นที่ลงขาย
  # รองรับ MiniMessage และสีแบบ hex
  all-category-name: "Auction House"

#=============================================================================
# CATEGORY DEFINITIONS (การกำหนดหมวดหมู่)
#=============================================================================
# แต่ละหมวดหมู่จะกำหนดด้วย:
#   - Key (ตัวระบุไม่ซ้ำ เช่น "weapons") - ใช้ในการอ้างอิงในไฟล์ inventory
#   - display-name: ชื่อที่จะแสดงใน GUI (รองรับ MiniMessage)
#   - rules: รายการกฎที่ใช้กำหนดว่าไอเท็มไหนอยู่ในหมวดนี้
#
# สำคัญ: key ของหมวดหมู่ต้องตรงกับค่า 'category' ใน inventories/categories.yml

#-----------------------------------------------------------------------------
# BLOCKS CATEGORY
#-----------------------------------------------------------------------------
# รวมบล็อกที่วางได้ทั้งหมดใน Minecraft
# ใช้ tag BLOCKS ของ Bukkit เพื่อแมตช์ให้ครอบคลุม

blocks:
  # ชื่อหมวดที่จะเห็นในเมนู categories
  display-name: "Blocks"

  # กฎสำหรับแมตช์ไอเท็มเข้าในหมวดนี้
  # ไอเท็มที่ตรงกับ "กฎใดกฎหนึ่ง" จะถูกนับอยู่ในหมวดนี้
  rules:
    # แมตช์ material ที่เป็นบล็อกทั้งหมดด้วย tag ของ Bukkit
    # tag BLOCKS จะรวมหัวข้อบล็อกที่วางได้ทั้งหมดใน Minecraft
    # วิธีนี้แม่นยำกว่าการไล่ชื่อ material ทีละตัว
    - type: tag
      tags:
        - BLOCKS    # tag ที่แมตช์บล็อก Minecraft ทั้งหมด

#-----------------------------------------------------------------------------
# WEAPONS CATEGORY
#-----------------------------------------------------------------------------
# รวมอาวุธโจมตี: ดาบ, คันธนู, หน้าไม้, หอก trident

weapons:
  display-name: "Weapons"

  rules:
    # แมตช์ดาบทุกประเภทด้วย suffix
    # ครอบคลุม: WOODEN_SWORD, STONE_SWORD, IRON_SWORD, GOLDEN_SWORD,
    # DIAMOND_SWORD, NETHERITE_SWORD รวมถึงดาบจากปลั๊กอิน/ม็อดที่ลงท้ายด้วย _SWORD
    - type: material-suffix
      suffixes:
        - "_SWORD"

    # แมตช์อาวุธระยะไกลที่ชื่อไม่เป็นแพทเทิร์น
    # เลยต้องระบุเป็นรายตัว
    - type: material
      materials:
        - BOW         # คันธนูปกติ
        - CROSSBOW    # หน้าไม้
        - TRIDENT     # หอกที่ขว้าง/โจมตีได้

#-----------------------------------------------------------------------------
# ARMOR CATEGORY
#-----------------------------------------------------------------------------
# รวมชุดเกราะ: หมวก, เกราะ, กางเกง, รองเท้า, โล่

armor:
  display-name: "Armor"

  rules:
    # แมตช์ชิ้นส่วนเกราะมาตรฐานด้วย suffix
    # ครอบคลุมวัสดุทุกประเภท: leather, chainmail, iron, gold, diamond, netherite
    - type: material-suffix
      suffixes:
        - "_HELMET"
        - "_CHESTPLATE"
        - "_LEGGINGS"
        - "_BOOTS"

    # แมตช์ไอเท็มป้องกันพิเศษที่ชื่อไม่ได้ตามแพทเทิร์นด้านบน
    - type: material
      materials:
        - ELYTRA        # ปีกสำหรับร่อน
        - SHIELD        # โล่สำหรับบล็อกการโจมตี
        - TURTLE_HELMET # หมวกเต่าที่คราฟจาก turtle scute

#-----------------------------------------------------------------------------
# TOOLS CATEGORY
#-----------------------------------------------------------------------------
# รวมเครื่องมือช่วยงาน: ขวาน, จอบ, พลั่ว, เคียว ฯลฯ

tools:
  display-name: "Tools"

  rules:
    # แมตช์เครื่องมือมาตรฐานด้วย suffix
    # ครอบคลุมวัสดุทุกประเภท: wooden, stone, iron, golden, diamond, netherite
    - type: material-suffix
      suffixes:
        - "_PICKAXE"
        - "_AXE"
        - "_SHOVEL"
        - "_HOE"

    # แมตช์เครื่องมือพิเศษที่ไม่ได้ใช้ suffix ข้างบน
    - type: material
      materials:
        - SHEARS          # กรรไกรตัดขนแกะ และตัดบล็อกบางประเภท
        - FLINT_AND_STEEL # ที่จุดไฟ
        - FISHING_ROD     # เบ็ดตกปลา

#-----------------------------------------------------------------------------
# CONSUMABLES CATEGORY
#-----------------------------------------------------------------------------
# รวมไอเท็มที่กิน/ดื่มได้ เช่น อาหารและ Potion

consumables:
  display-name: "Consumables"

  rules:
    # แมตช์ potion และอาหารมีค่าบางส่วน
    # เลือกเฉพาะ consumable ที่มีมูลค่าสูงหรือนิยมเทรด
    - type: material
      materials:
        # Potion
        - POTION           # Potion ดื่ม
        - SPLASH_POTION    # Potion ขว้าง
        - LINGERING_POTION # Potion สร้างหมอกค้าง

        # อาหารราคาแพง/พิเศษ
        - GOLDEN_APPLE           # แอปเปิลทอง
        - ENCHANTED_GOLDEN_APPLE # Notch / God apple

        # อาหารปรุงสุกที่มักใช้เทรด
        - COOKED_BEEF     # สเต็ก
        - COOKED_PORKCHOP # หมูย่าง
        - BREAD           # ขนมปัง
        - CAKE            # เค้ก (วางได้)
        - COOKIE          # คุกกี้
        - PUMPKIN_PIE     # พายฟักทอง

#-----------------------------------------------------------------------------
# RESOURCES CATEGORY
#-----------------------------------------------------------------------------
# รวมทรัพยากร: แร่, อินก็อต และวัตถุดิบคราฟต์

resources:
  display-name: "Resources"

  rules:
    # แมตช์วัตถุดิบคราฟต์ที่นิยมเทรด
    # เป็นของที่ใช้คราฟต์บ่อยและมีมูลค่าในเศรษฐกิจ
    - type: material
      materials:
        # วัสดุแปรรูป (อินก็อตและอัญมณี)
        - COAL            # เชื้อเพลิงและคราฟต์
        - IRON_INGOT      # โลหะทั่วไป
        - GOLD_INGOT      # โลหะมีค่า
        - DIAMOND         # เพชร
        - EMERALD         # สกุลเงินชาวบ้าน (villager)
        - NETHERITE_INGOT # วัตถุดิบ endgame
        - LAPIS_LAZULI    # วัตถุดิบ Enchant
        - REDSTONE        # วัตถุดิบวงจร
        - COPPER_INGOT    # วัตถุดิบสร้างบ้าน
        - AMETHYST_SHARD  # วัตถุตกแต่ง

        # แร่ดิบ (สำหรับขุดด้วย Silk Touch)
        - RAW_IRON        # เหล็กดิบ
        - RAW_GOLD        # ทองดิบ
        - RAW_COPPER      # ทองแดงดิบ

#-----------------------------------------------------------------------------
# ENCHANTED BOOKS CATEGORY
#-----------------------------------------------------------------------------
# รวมหนังสือ Enchanted สำหรับการเทรด Enchant
# หนังสือ Enchanted เป็นไอเท็มยอดนิยมบน auction house

enchanted-books:
  display-name: "Enchanted Books"

  rules:
    # แมตช์เฉพาะ Enchanted Book
    # หมายเหตุ: แมตช์ตามประเภทไอเท็ม ไม่ได้เช็กว่ามี enchant หรือไม่
    # หนังสือธรรมดา (BOOK) จะไม่อยู่ในหมวดนี้
    - type: material
      materials:
        - ENCHANTED_BOOK

#-----------------------------------------------------------------------------
# MISCELLANEOUS CATEGORY (FALLBACK)
#-----------------------------------------------------------------------------
# รวมไอเท็มทุกอย่างที่ไม่ตรงกับหมวดอื่น
# ทำหน้าที่เป็นหมวดสำรอง (catch-all) เพื่อให้ไอเท็มทุกชิ้นมีที่อยู่
#
# สำคัญ: หมวดที่ "ไม่มี rules" จะกลายเป็น fallback category
# ไอเท็มที่ไม่ตรงกับ weapons, armor, tools ฯลฯ จะมาโผล่ในหมวดนี้

misc:
  display-name: "Miscellaneous"
  # ไม่ต้องกำหนด rules ใด ๆ = ใช้เป็น fallback สำหรับไอเท็มที่ไม่เข้าเงื่อนไขหมวดอื่น
  # ไอเท็มที่ไม่ตรง weapons, armor, tools ฯลฯ จะมาอยู่ที่หมวดนี้

