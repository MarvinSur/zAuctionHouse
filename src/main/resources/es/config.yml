#=============================================================================
# AJUSTES DE DEPURACION Y MONITOREO
#=============================================================================

# Activa los registros detallados y los mensajes de error en la consola.
# Usalo durante la resolucion de problemas o cuando el soporte requiera informacion de depuracion.
# Cuando esta activado, el plugin muestra informacion detallada sobre las operaciones.
# Recomendado: Mantener desactivado en produccion, activar solo para investigaciones.
enable-debug: false

# Activa el monitoreo y los registros de rendimiento.
# Cuando esta activado, el plugin registra los tiempos de ejecucion de las operaciones pesadas:
# - Ordenacion y filtrado de objetos
# - Coincidencia y conteo de categorias
# - Carga y consultas de base de datos
# - Operaciones de cache y reconstrucciones
# Util para diagnosticar problemas de rendimiento con grandes casas de subastas (1000+ objetos).
# Recomendado: Activar temporalmente en caso de lag o cargas de inventario lentas.
enable-performance-debug: false

# Activa la verificacion automatica de la version respecto a la ultima release.
# Cuando esta activado, el plugin notifica la consola/admin si hay una nueva version disponible.
# Esto NO actualiza automaticamente el plugin, solo muestra una notificacion.
# Recomendado: Mantener activado para estar informado de actualizaciones importantes y correcciones de bugs.
enable-version-checker: true

# Configuracion del filtro de depuracion de rendimiento.
# Permite concentrarse en operaciones especificas filtrando cuales se registran.
# Relevante solo cuando 'enable-performance-debug' es true.
performance-debug:
  filter:
    # Opciones del modo de filtro:
    # - DISABLED: Registra todas las operaciones (predeterminado, sin filtro)
    # - WHITELIST: Registra solo las operaciones listadas en 'operations'
    # - BLACKLIST: Registra todas las operaciones EXCEPTO las listadas en 'operations'
    mode: DISABLED

    # Lista de nombres de operaciones a filtrar.
    # Soporta el sufijo comodin (*) para la coincidencia por prefijo.
    # Ejemplo: "loadItems.*" coincide con loadItems.loadPlayers, loadItems.loadItemsFromDB, etc.
    #
    # Nombres de operaciones disponibles:
    # Operaciones de carga:
    #   - loadItems.loadPlayers        : Tiempo para cargar los datos de los jugadores
    #   - loadItems.loadItemsFromDB    : Tiempo para cargar los objetos de la BD
    #   - loadItems.loadAuctionItemsFromDB : Tiempo para cargar los objetos en subasta
    #   - loadItems.processItems       : Tiempo para procesar los objetos cargados
    #   - loadItems.total              : Tiempo total de carga
    #   - loadItems.rebuildSortedItemsCache : Tiempo para reconstruir la cache ordenada
    #
    # Operaciones de cache:
    #   - SortedItemsCache.rebuild     : Tiempo para reconstruir la cache de objetos ordenados
    #   - getItemsListedForSale        : Tiempo para recuperar los objetos en venta
    #   - resolveItems[SALE]           : Tiempo para resolver los objetos de venta
    #   - getItemIds[SALE]             : Tiempo para obtener los IDs de objetos en venta
    #
    # Operaciones de categoria:
    #   - applyCategories              : Tiempo para aplicar los filtros de categoria
    #   - computeCategoryCount[categoryId] : Tiempo para contar los objetos por categoria
    #
    # Operaciones sobre objetos:
    #   - item.BuildItemStack          : Tiempo para construir los ItemStack para la visualizacion
    #   - item.CreatePlaceholders      : Tiempo para crear los placeholders de objetos
    #
    # Operaciones de inventario:
    #   - openInventory.<nombre archivo>    : Tiempo para abrir un inventario especifico
    operations:
      - "loadItems.*"
      - "SortedItemsCache.*"

#=============================================================================
# AJUSTES GENERALES
#=============================================================================

# Formato de fecha usado en el plugin para mostrar las marcas de tiempo.
# Usa los patrones de Java SimpleDateFormat.
# Patrones comunes:
#   dd    - Dia del mes (01-31)
#   MM    - Mes (01-12)
#   yyyy  - Ano (4 digitos)
#   HH    - Hora formato 24h (00-23)
#   hh    - Hora formato 12h (01-12)
#   mm    - Minutos (00-59)
#   ss    - Segundos (00-59)
# Ejemplos:
#   "dd/MM/yyyy HH:mm:ss" ‚Üí "25/12/2024 14:30:45"
#   "MM-dd-yyyy hh:mm a"  ‚Üí "12-25-2024 02:30 PM"
date-format: dd/MM/yyyy HH:mm:ss

# Zona horaria utilizada para mostrar fechas.
# Utiliza los identificadores de Java TimeZone. Establece "auto" para usar la zona horaria predeterminada del servidor.
# Ejemplos:
#   "auto"              ‚Üí Usa la zona horaria predeterminada del servidor
#   "UTC"               ‚Üí Tiempo Universal Coordinado
#   "Europe/Paris"      ‚Üí Hora Central Europea (UTC+1/UTC+2)
#   "America/New_York"  ‚Üí Hora del Este (UTC-5/UTC-4)
#   "Asia/Tokyo"        ‚Üí Hora Est√°ndar de Jap√≥n (UTC+9)
# Lista completa: https://docs.oracle.com/javase/8/docs/api/java/util/TimeZone.html
timezone: auto

#=============================================================================
# CONFIGURACION DE BASE DE DATOS
#=============================================================================

# Tipo de almacenamiento para los datos de las subastas.
# Opciones disponibles:
# - SQLITE  : Base de datos local en archivo (predeterminado, sin configuracion requerida)
#             Ideal para: Servidor unico, casas de subastas pequenas-medianas
# - MYSQL   : Servidor de base de datos MySQL
#             Ideal para: Configuraciones multi-servidor, grandes casas de subastas
# - MARIADB : Servidor de base de datos MariaDB (compatible con MySQL)
#             Ideal para: Configuraciones multi-servidor, grandes casas de subastas
# Nota: Para la sincronizacion multi-servidor, usa MySQL/MariaDB con el addon Redis.
storage-type: SQLITE

# Identificador del nombre del servidor para configuraciones multi-servidor.
# Este nombre se almacena con cada anuncio para identificar de que servidor proviene.
# Util para rastrear el origen de las ventas con una BD compartida entre varios servidores.
# Recomendado: Usa un nombre unico y descriptivo (ej: "skyblock", "survival", "creative").
server-name: skyblock

# Ajustes de conexion para MySQL/MariaDB.
# Usado solo cuando 'storage-type' es MYSQL o MARIADB.
database-configuration:
  # Prefijo aplicado a todas las tablas creadas por el plugin.
  # Util para compartir una BD con otros plugins y evitar conflictos de nombres.
  # ATENCION: No cambiar despues de que el plugin haya almacenado datos, de lo contrario se perderan.
  # Tablas creadas por defecto: {prefix}items, {prefix}auction_items, {prefix}players, etc.
  table-prefix: zauctionhousev4_

  # Direccion IP o hostname del servidor de base de datos.
  # Usa 'localhost' o '127.0.0.1' si la BD esta en la misma maquina.
  # Para BD remotas, usa la direccion IP o el nombre de dominio del servidor.
  host: 192.168.10.10

  # Numero de puerto del servidor de base de datos.
  # Puerto predeterminado MySQL/MariaDB: 3306
  # Cambiar solo si tu BD usa un puerto no estandar.
  port: 3306

  # Nombre de usuario para la autenticacion.
  # Este usuario debe tener los permisos: SELECT, INSERT, UPDATE, DELETE, CREATE TABLE
  user: homestead

  # Contrasena del usuario.
  # Mantenla segura y no compartas tu archivo de configuracion publicamente.
  password: secret

  # Nombre de la base de datos donde se almacenaran los datos.
  # La base de datos debe existir antes del inicio del plugin.
  # El plugin creara automaticamente las tablas requeridas.
  database: zauctionhouse

  # Activa la depuracion de consultas SQL.
  # Cuando esta activado, todas las consultas SQL se registran en la consola.
  # ATENCION: Esto genera mucha salida. Activar solo para la resolucion de problemas de BD.
  # Recomendado: Mantener desactivado en produccion.
  debug: false

#=============================================================================
# ATAJOS DE COLOR PARA LOS MENSAJES
#=============================================================================

# Claves de color personalizadas usables en los mensajes del plugin.
# Estos atajos simplifican la personalizacion definiendo codigos de color reutilizables.
# Uso: Escribe <primary> en cualquier mensaje y sera reemplazado por el color hex.
# Soporta el formato MiniMessage y los colores hex (#RRGGBB).
#
# Ejemplo de uso en los mensajes:
#   "<primary>Bienvenido <secondary>a la casa de subastas!"
#   Se convierte en: "#24d65d Bienvenido #656665 a la casa de subastas!"
message-colors:
  # Color primario - Usado para texto importante, titulos, destacados
  - key: <primary>
    color: '#24d65d'
  # Color secundario - Usado para texto menos importante, descripciones
  - key: <secondary>
    color: '#656665'
  # Color de error - Usado para mensajes de error, advertencias
  - key: <error>
    color: '#ff0000'
  # Color de exito - Usado para mensajes de exito, confirmaciones
  - key: <success>
    color: '#00ff00'

#=============================================================================
# CONFIGURACION DE COMANDOS
#=============================================================================

# Configuracion de comandos para alias y argumentos.
# IMPORTANTE: Reinicio del servidor requerido despues de modificar esta seccion!
# Los cambios en los comandos no se aplican con /ah admin reload.

commands:
  # Comando principal: /zauctionhouse (abre la casa de subastas)
  main-command:
    # Nombres de comando alternativos que funcionan identicamente a /zauctionhouse
    # Los jugadores pueden usar cualquiera de estos para abrir la casa de subastas.
    aliases:
      - ah           # Corto y comun
      - cds          # Abreviatura espanola (Casa De Subastas)
      - auction      # Nombre ingles completo
      - zauction     # Version con prefijo del plugin

  # Comando de venta: /zauctionhouse sell <precio> [cantidad] [economia]
  # Usado por los jugadores para poner objetos en venta.
  sell:
    # Cuando esta activado, ejecutar /ah sell sin argumentos abre un GUI
    # donde el jugador puede seleccionar objetos, ajustar el precio y elegir la economia.
    # Cuando esta desactivado, /ah sell requiere un argumento de precio.
    # Recomendado: Activar para una mejor experiencia de usuario, desactivar para usuarios avanzados.
    enable-sell-inventory: false

    # Nombres alternativos para el subcomando sell.
    # Ejemplo: /ah s 1000 (pone en venta el objeto en mano por 1000)
    aliases:
      - sell
      - s
      - vender      # Espanol

    # Configuracion de los argumentos del comando
    arguments:
      # Argumento precio (requerido cuando el inventario de venta esta desactivado)
      - name: price
        display-name: precio
        required: true
        # Sugerencias de autocompletado para el precio
        # Aparecen cuando el jugador presiona Tab durante la escritura.
        auto-completion:
          - 1000
          - 10000
          - 25000

      # Argumento cantidad (opcional) - Cuantos objetos vender del stack
      - name: amount
        display-name: cantidad
        required: false
        # %max-stack-size% se reemplaza por el tamano maximo del stack del objeto
        auto-completion:
          - '1'
          - '%max-stack-size%'

      # Argumento economia (opcional) - Que moneda usar
      - name: economy
        display-name: economia
        required: false
        # Lista aqui los nombres de tus economias activadas para el autocompletado
        auto-completion:
          - vault

  # Comando claim: /zauctionhouse claim
  # Usado para reclamar el dinero pendiente de las ventas (cuando auto-claim esta desactivado).
  claim:
    aliases:
      - claim
      - c
      - reclamar   # Espanol

  # Comando buscar: /zauctionhouse search <consulta>
  # Busca objetos en la casa de subastas por texto.
  search:
    aliases:
      - search
      - s
      - buscar        # Espanol
    arguments:
      - name: query
        display-name: consulta
        required: true
        auto-completion: []

  # Comando page: /zauctionhouse page <numero>
  # Abre la casa de subastas directamente en una pagina especifica.
  page:
    aliases:
      - page
      - p
      - pagina     # Espanol
    arguments:
      - name: page
        display-name: pagina
        required: true
        auto-completion:
          - '1'
          - '2'
          - '3'
          - '5'
          - '10'

  # Comandos de inventario personalizados
  # Estos comandos proporcionan acceso rapido a secciones especificas.
  # Cada entrada crea un nuevo subcomando bajo /zauctionhouse.
  inventories:
    # Comando: /ah selling - Abre los objetos actualmente en venta del jugador
    - enable: true
      # Permiso requerido para usar este comando (dejar vacio = sin permiso)
      permission: "zauctionhouse.selling"
      # Descripcion mostrada en la ayuda y en el autocompletado
      description: "Abrir los objetos en venta"
      aliases:
        - 'selling'
        - 'enventa'
      # Identificador interno del inventario (ver carpeta inventories/)
      inventory: SELLING_ITEMS
      # Descomentar para activar el argumento pagina: /ah selling <pagina>
      # enable-page: true
      # page-name: "pagina"

    # Comando: /ah expired - Abre los objetos caducados del jugador
    - enable: true
      permission: "zauctionhouse.expired"
      description: "Abrir los objetos caducados"
      aliases:
        - 'expired'
        - 'caducados'
      inventory: EXPIRED_ITEMS

    # Comando: /ah purchased - Abre los objetos comprados por el jugador
    - enable: true
      permission: "zauctionhouse.purchased"
      description: "Abrir los objetos comprados"
      aliases:
        - 'purchased'
        - 'comprados'
      inventory: PURCHASED_ITEMS

    # Comando: /ah history - Abre el historial de ventas del jugador
    - enable: true
      permission: "zauctionhouse.history"
      description: "Abrir el historial"
      aliases:
        - 'history'
        - 'historial'
      inventory: HISTORY

  # Configuraci√≥n del cooldown de comandos
  # Evita que los jugadores env√≠en spam de comandos imponiendo un retraso entre ejecuciones.
  # NOTA: Estos valores S√ć se recargan con /ah admin reload.
  cooldown:

    # Cooldown predeterminado en milisegundos aplicado a todos los comandos.
    # Establece en 0 para desactivar completamente el cooldown.
    # ADVERTENCIA: Se recomienda encarecidamente mantener un cooldown (ej: 100ms) para prevenir el spam de comandos.
    default-cooldown: 100

    # Permiso que permite a un jugador evadir el cooldown de comandos.
    bypass-permission: "zauctionhouse.cooldown.command.bypass"

    # Cooldowns personalizados por comando (en milisegundos).
    # Usa el primer alias del comando como clave.
    # Los comandos no listados aqu√≠ usar√°n el valor default-cooldown.
    # Ejemplos:
    #   sell: 500      # 500ms de cooldown para /ah sell
    #   claim: 1000    # 1 segundo de cooldown para /ah claim
    #   page: 50       # 50ms de cooldown para /ah page
    per-command: {}

#=============================================================================
# ATAJOS DE PRECIO
#=============================================================================

# Atajos de multiplicacion para los comandos de venta.
# Permite a los jugadores usar una notacion abreviada para numeros grandes.
# Ejemplo: /ah sell 1K = /ah sell 1000
# Ejemplo: /ah sell 2.5M = /ah sell 2500000
number-sell-multiplication:
  # Activar o desactivar esta funcionalidad
  enable: true

  # Definiciones de formato (sin distincion de mayusculas/minusculas)
  # Los jugadores escriben el sufijo 'format', y el precio se multiplica por 'multiplication'.
  formats:
    - format: K          # Miles (1 000)
      multiplication: 1000
    - format: M          # Millones (1 000 000)
      multiplication: 1000000
    - format: B          # Miles de millones (1 000 000 000)
      multiplication: 1000000000
    - format: T          # Billones
      multiplication: 1000000000000
    - format: Q          # Miles de billones
      multiplication: 1000000000000000
    - format: QQ         # Trillones
      multiplication: 1000000000000000000
    - format: S          # Miles de trillones
      multiplication: 1000000000000000000000
    - format: SS         # Cuatrillones
      multiplication: 1000000000000000000000000
    - format: O          # Miles de cuatrillones
      multiplication: 1000000000000000000000000000
    - format: N          # Quintillones
      multiplication: 1000000000000000000000000000000
    - format: D          # Miles de quintillones
      multiplication: 1000000000000000000000000000000000
    - format: UN         # Sextillones
      multiplication: 1000000000000000000000000000000000000
    - format: DD         # Miles de sextillones
      multiplication: 1000000000000000000000000000000000000000
    - format: TR         # Septillones
      multiplication: 1000000000000000000000000000000000000000000

#=============================================================================
# AJUSTES DE CADUCIDAD
#=============================================================================

# Tiempo de caducidad para los diferentes estados de los objetos.
# Todos los tiempos estan en SEGUNDOS.
# Valores comunes:
#   3600    = 1 hora
#   86400   = 1 dia
#   172800  = 2 dias
#   259200  = 3 dias
#   604800  = 1 semana
#   2592000 = 30 dias

expiration:
  # Duracion de los anuncios antes de la caducidad.
  auction:
    # Tiempo de caducidad predeterminado en segundos (172800 = 2 dias)
    # Despues de este tiempo, los objetos no vendidos van a la seccion "objetos caducados".
    default-expiration: 172800

    # Tiempos de caducidad basados en permisos.
    # Los jugadores con permisos especificos pueden tener duraciones diferentes.
    permission:
      # Activar o desactivar la caducidad basada en permisos
      enable: false
      # Lista de permisos (verificados en orden, primera coincidencia usada)
      # IMPORTANTE: Ordenar de la prioridad mas baja a la mas alta
      permissions:
        - permission: zauctionhouse.expiration.vip
          expiration: 3600       # 1 hora
        - permission: zauctionhouse.expiration.elite
          expiration: 7200       # 2 horas
        - permission: zauctionhouse.expiration.legend
          expiration: 259200     # 3 dias

  # Duracion de los anuncios de puja (funcionalidad futura).
  bid:
    default-expiration: 172800
    permission:
      enable: false
      permissions:
        - permission: zauctionhouse.expiration.vip
          expiration: 3600
        - permission: zauctionhouse.expiration.elite
          expiration: 7200
        - permission: zauctionhouse.expiration.legend
          expiration: 259200

  # Duracion de los anuncios de alquiler (funcionalidad futura).
  rent:
    default-expiration: 172800
    permission:
      enable: false
      permissions:
        - permission: zauctionhouse.expiration.vip
          expiration: 3600
        - permission: zauctionhouse.expiration.elite
          expiration: 7200
        - permission: zauctionhouse.expiration.legend
          expiration: 259200

  # Duracion de conservacion de los objetos caducados antes de la eliminacion definitiva.
  # Despues de este tiempo, los objetos caducados no retirados se pierden definitivamente.
  # Recomendado: Al menos 1 semana para dar a los jugadores tiempo de retirar sus objetos.
  expire:
    default-expiration: 604800   # 1 semana
    permission:
      enable: false

  # Duracion de conservacion de los objetos comprados antes de la eliminacion definitiva.
  # Despues de este tiempo, los objetos comprados no retirados se pierden definitivamente.
  # Recomendado: Al menos 1 semana para dar a los jugadores tiempo de retirar sus objetos.
  purchase:
    default-expiration: 604800   # 1 semana
    permission:
      enable: false

#=============================================================================
# LIMITES DE ANUNCIOS
#=============================================================================

# Numero maximo de objetos que un jugador puede tener en venta simultaneamente.
# Los jugadores necesitan permisos especificos para aumentar su limite.

permissions:
  # Limites para los anuncios de subasta regulares
  auction:
    - permission: zauctionhouse.max.5
      limit: 5
    - permission: zauctionhouse.max.10
      limit: 10
