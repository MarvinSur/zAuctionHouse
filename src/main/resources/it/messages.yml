################################################################################################################################
#
#   zAuctionHouse V4 - Configurazione dei Messaggi (Italiano)
#
#   Questo file contiene tutti i messaggi mostrati ai giocatori dal plugin.
#   Personalizza questi messaggi per adattarli alla lingua e allo stile del tuo server.
#
#   FORMATTAZIONE:
#   - Supporta il formato MiniMessage: <red>, <bold>, <gradient:red:blue>, ecc.
#   - Supporta i colori hex: #RRGGBB o #RGB
#   - Supporta i codici legacy: &c, &l, ecc. (non consigliato, usa MiniMessage)
#   - Usa le scorciatoie di colore definite in config.yml: <primary>, <secondary>, <error>, <success>
#
#   PLACEHOLDER:
#   - Lo stile %placeholder% viene usato per i valori dinamici
#   - I placeholder disponibili variano secondo il messaggio (documentato in linea)
#
#   Documentazione: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# MESSAGGI GENERALI
#=============================================================================

# Prefisso aggiunto prima di tutti i messaggi del plugin.
# Imposta una stringa vuota "" per disattivare il prefisso.
# Placeholder disponibili: nessuno
prefix: "<primary>zAuctionHouse <secondary>• "

#=============================================================================
# MESSAGGI DI VERSIONE E AGGIORNAMENTO
#=============================================================================

# Mostrato quando è disponibile una nuova versione del plugin (se version-checker è attivato).
# Placeholder disponibili:
#   %version% - Versione attualmente installata
#   %latest%  - Ultima versione disponibile
version-available: "<#ff0000>È disponibile una nuova versione di zAuctionHouse! <gray>(<white>attuale: <#ff9900>%version% <gray>| <white>ultima: <#00ff00>%latest%<gray>)"

#=============================================================================
# MESSAGGI DEI COMANDI
#=============================================================================

# Mostrato quando un comando viene usato male.
# Placeholder disponibili:
#   %syntax% - Sintassi corretta del comando
command-syntax-error: "<error>Devi eseguire il comando così<gray>: <success>%syntax%"

# Mostrato quando il giocatore non ha il permesso per un comando.
# Placeholder disponibili: nessuno
command-no-permission: "<error>Non hai il permesso di eseguire questo comando."

# Mostrato quando un comando riservato ai giocatori viene eseguito dalla console.
# Placeholder disponibili: nessuno
command-no-console: "<error>Solo un giocatore può eseguire questo comando."

# Mostrato quando gli argomenti del comando non corrispondono a nessun sottocomando valido.
# Placeholder disponibili: nessuno
command-no-arg: "<error>Impossibile trovare il comando con i suoi argomenti."

# Mostrato quando un comando viene usato in un contesto ristretto (mondo vietato, ecc.).
# Placeholder disponibili: nessuno
command-restricted: "<error>Non puoi usare questo comando qui."

# Mostrato quando un giocatore esegue un comando troppo velocemente (cooldown attivo).
# Placeholder disponibili: nessuno
command-cooldown: "<error>Attendi prima di usare nuovamente questo comando."

# Formato per le voci di aiuto dei comandi.
# Placeholder disponibili:
#   %syntax%      - Sintassi del comando
#   %description% - Descrizione del comando
command-syntax-help: "<white>%syntax% <dark_gray>» <gray>%description%"

