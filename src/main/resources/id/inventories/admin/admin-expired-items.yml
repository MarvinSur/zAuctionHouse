################################################################################################################################
#
#   zAuctionHouse V4 - Menu Admin Barang Kadaluarsa
#
#   Menu ini ngasih admin akses buat ngecek dan ngurusin barang kadaluarsa seorang player.
#   Admin bisa narik balik barang buat dibalikin ke player kalo misal ada masalah.
#
#   TINDAKAN ADMIN:
#   - Liat semua barang kadaluarsa punya si player
#   - Tarik barang buat dibalikin ke player
#   - Kepake banget buat balikin barang kalo ada laporan dari player
#
#   CARA BUKA:
#   - Dari menu utama riwayat admin → Tombol Barang Kadaluarsa
#   - /ah admin open expired <player>
#
#   Dokumentasi: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# PENGATURAN MENU
#=============================================================================

# Judul menu dengan placeholder halaman.
name: '#0c1719Admin barang kadaluarsa (%page%/%max-page%)'

# Ukuran menu - 6 baris.
size: 54

#=============================================================================
# POLA MENU
#=============================================================================

patterns:
  # Nambahin hiasan kaca di pinggiran.
  - 'zauctionhouse-decoration'
  # Tombol halaman sebelumnya/selanjutnya.
  - 'zauctionhouse-pagination'
  # Tombol kembali ke menu utama riwayat admin.
  - 'zauctionhouse-back'

#=============================================================================
# TOMBOL & TAMPILAN
#=============================================================================

items:

  #---------------------------------------------------------------------------
  # TAMPILAN BARANG KADALUARSA
  #---------------------------------------------------------------------------
  # Nampilin semua barang kadaluarsa punya player yang dituju.
  # Klik barangnya buat narik barang itu (tindakan admin).

  items:
    # Tipe tombol - nampilin barang kadaluarsa admin yang bisa ditarik.
    type: ZAUCTIONHOUSE_ADMIN_EXPIRED_ITEMS

    # Slot buat nampilin barang kadaluarsa (4 baris × 9 kolom = 36 slot).
    slots:
      - 9-17    # Baris 2
      - 18-26   # Baris 3
      - 27-35   # Baris 4
      - 36-44   # Baris 5

    # Tampilan pas gak ada barang kadaluarsa sama sekali.
    else:
      slots:
        - 22
      item:
        material: BARRIER
        name: '#ff0000&nBelum Ada Barang'
