################################################################################################################################
#
#   zAuctionHouse V4 - Menu Jualan Saya (Barang Kamu)
#
#   Menu ini nampilin barang yang lagi kamu jual saat ini.
#   Player bisa narik jualan di sini buat batalin jualan dan ngambil barangnya balik.
#
#   FITUR:
#   - Liat semua barang yang lagi kamu jual
#   - Ngecek sisa waktu sebelum barangnya kadaluarsa
#   - Tarik barang dari jualan (batalin jualan)
#   - Barang gak bisa dibeli dari menu ini (karena ini barang kamu sendiri)
#
#   CARA BUKA:
#   - /ah selling
#   - Klik tombol "Jualan Saya" di menu lelang utama
#
#   Dokumentasi: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# PENGATURAN MENU
#=============================================================================

# Judul menu dengan placeholder halaman.
name: '#0c1719Jualan Saya (%page%/%max-page%)'

# Ukuran menu - 6 baris.
size: 54

#=============================================================================
# POLA MENU
#=============================================================================

patterns:
  # Nambahin hiasan kaca di pinggiran.
  - 'zauctionhouse-decoration'
  # Tombol halaman sebelumnya/selanjutnya.
  - 'zauctionhouse-pagination'
  # Tombol kembali ke rumah lelang.
  - 'zauctionhouse-back'

#=============================================================================
# TOMBOL & TAMPILAN
#=============================================================================

items:

  #---------------------------------------------------------------------------
  # TAMPILAN BARANG YANG DIJUAL
  #---------------------------------------------------------------------------
  # Nampilin semua barang yang lagi ditayangin buat dijual sama player yang lagi liat.
  # Klik barangnya buat ditarik/batal dijual.

  items:
    # Tipe tombol - nampilin dan ngurusin barang yang lagi dijual.
    type: ZAUCTIONHOUSE_SELLING_ITEMS

    # Slot buat tulisan kosong pas lagi gak ada barang.
    empty-slot: 22

    # Slot buat nampilin barang yang lagi dijual (4 baris × 9 kolom = 36 slot).
    slots:
      - 9-17    # Baris 2
      - 18-26   # Baris 3
      - 27-35   # Baris 4
      - 36-44   # Baris 5

    # Tampilan pas gak ada barang yang lagi dijual.
    item:
      material: BARRIER
      name: '#ff0000&nBelum Ada Jualan'

  #---------------------------------------------------------------------------
  # TOMBOL TARIK SEMUA
  #---------------------------------------------------------------------------
  # Narik semua barang yang lagi dijual sekaligus (kalo tasnya muat).

  remove-all:
    type: ZAUCTIONHOUSE_REMOVE_ALL_SELLING
    is-permanent: true
    slot: 47
    item:
      material: CHEST
      name: "#2CCED2<bold>Tarik Semua"
      lore:
        - "#92ffffTarik semua jualan."
        - ""
        - "#8c8c8c• #2CCED2Klik #92ffffbuat narik semua"
