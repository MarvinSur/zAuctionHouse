################################################################################################################################
#
#   zAuctionHouse V4 - การตั้งค่าข้อความ (Messages Configuration)
#
#   ไฟล์นี้เก็บข้อความทั้งหมดที่ผู้เล่นจะเห็นจากปลั๊กอิน
#   คุณสามารถแก้ไขให้ตรงกับภาษาและสไตล์ของเซิร์ฟเวอร์คุณได้
#
#   การจัดรูปแบบ (FORMATTING):
#   - รองรับรูปแบบ MiniMessage เช่น <red>, <bold>, <gradient:red:blue> เป็นต้น
#   - รองรับสีแบบ hex: #RRGGBB หรือ #RGB
#   - รองรับโค้ดสีแบบ legacy: &c, &l เป็นต้น (ไม่แนะนำ ควรใช้ MiniMessage แทน)
#   - สามารถใช้โค้ดสีลัดที่กำหนดไว้ใน config.yml ได้ เช่น <primary>, <secondary>, <error>, <success>
#
#   PLACEHOLDERS:
#   - ใช้รูปแบบ %placeholder% สำหรับค่าที่เปลี่ยนแปลงได้
#   - placeholder ที่ใช้ได้จะแตกต่างกันไปในแต่ละข้อความ (อธิบายไว้ในคอมเมนต์ของแต่ละส่วน)
#
#   Documentation: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# GENERAL MESSAGES
#=============================================================================

# prefix ที่จะถูกเพิ่มไว้หน้าข้อความทั้งหมดของปลั๊กอิน
# ตั้งค่าเป็นสตริงว่าง "" หากต้องการปิด prefix
# placeholder ที่ใช้ได้: ไม่มี
prefix: "<primary>zAuctionHouse <secondary>• "

#=============================================================================
# VERSION & UPDATE MESSAGES
#=============================================================================

# แสดงเมื่อมีเวอร์ชันใหม่ของปลั๊กอิน (ถ้าเปิดใช้งานตัวเช็กเวอร์ชัน)
# placeholder ที่ใช้ได้:
#   %version% - เวอร์ชันที่ติดตั้งอยู่ตอนนี้
#   %latest%  - เวอร์ชันล่าสุดที่มีให้ใช้
version-available: "<#ff0000>มีเวอร์ชันใหม่ของ zAuctionHouse ให้ใช้งานแล้ว! <gray>(<white>ปัจจุบัน: <#ff9900>%version% <gray>| <white>ล่าสุด: <#00ff00>%latest%<gray>)"

#=============================================================================
# COMMAND MESSAGES
#=============================================================================

