#=============================================================================
# IMPOSTAZIONI DI DEBUG E MONITORAGGIO
#=============================================================================

# Attiva i log dettagliati e i messaggi di errore nella console.
# Usalo durante la risoluzione dei problemi o quando il supporto richiede informazioni di debug.
# Quando attivato, il plugin mostra informazioni dettagliate sulle operazioni.
# Consigliato: Tenere disattivato in produzione, attivare solo per le indagini.
enable-debug: false

# Attiva il monitoraggio e i log delle prestazioni.
# Quando attivato, il plugin registra i tempi di esecuzione delle operazioni pesanti:
# - Ordinamento e filtraggio degli oggetti
# - Corrispondenza e conteggio delle categorie
# - Caricamento e query del database
# - Operazioni di cache e ricostruzioni
# Utile per diagnosticare problemi di prestazioni con grandi case d'aste (1000+ oggetti).
# Consigliato: Attivare temporaneamente in caso di lag o caricamenti di inventario lenti.
enable-performance-debug: false

# Attiva la verifica automatica della versione rispetto all'ultima release.
# Quando attivato, il plugin notifica la console/admin se √® disponibile una nuova versione.
# Questo NON aggiorna automaticamente il plugin, mostra solo una notifica.
# Consigliato: Tenere attivato per essere informati di aggiornamenti importanti e correzioni di bug.
enable-version-checker: true

# Configurazione del filtro di debug delle prestazioni.
# Permette di concentrarsi su operazioni specifiche filtrando quali vengono registrate.
# Rilevante solo quando 'enable-performance-debug' √® true.
performance-debug:
  filter:
    # Opzioni della modalit√† filtro:
    # - DISABLED: Registra tutte le operazioni (predefinito, nessun filtro)
    # - WHITELIST: Registra solo le operazioni elencate in 'operations'
    # - BLACKLIST: Registra tutte le operazioni TRANNE quelle elencate in 'operations'
    mode: DISABLED

    # Lista dei nomi delle operazioni da filtrare.
    # Supporta il suffisso jolly (*) per la corrispondenza per prefisso.
    # Esempio: "loadItems.*" corrisponde a loadItems.loadPlayers, loadItems.loadItemsFromDB, ecc.
    #
    # Nomi delle operazioni disponibili:
    # Operazioni di caricamento:
    #   - loadItems.loadPlayers        : Tempo per caricare i dati dei giocatori
    #   - loadItems.loadItemsFromDB    : Tempo per caricare gli oggetti dal DB
    #   - loadItems.loadAuctionItemsFromDB : Tempo per caricare gli oggetti all'asta
    #   - loadItems.processItems       : Tempo per elaborare gli oggetti caricati
    #   - loadItems.total              : Tempo totale di caricamento
    #   - loadItems.rebuildSortedItemsCache : Tempo per ricostruire la cache ordinata
    #
    # Operazioni di cache:
    #   - SortedItemsCache.rebuild     : Tempo per ricostruire la cache degli oggetti ordinati
    #   - getItemsListedForSale        : Tempo per recuperare gli oggetti in vendita
    #   - resolveItems[SALE]           : Tempo per risolvere gli oggetti di vendita
    #   - getItemIds[SALE]             : Tempo per ottenere gli ID degli oggetti in vendita
    #
    # Operazioni di categoria:
    #   - applyCategories              : Tempo per applicare i filtri di categoria
    #   - computeCategoryCount[categoryId] : Tempo per contare gli oggetti per categoria
    #
    # Operazioni sugli oggetti:
    #   - item.BuildItemStack          : Tempo per costruire gli ItemStack per la visualizzazione
    #   - item.CreatePlaceholders      : Tempo per creare i placeholder degli oggetti
    #
    # Operazioni di inventario:
    #   - openInventory.<nome file>    : Tempo per aprire un inventario specifico
    operations:
      - "loadItems.*"
      - "SortedItemsCache.*"

#=============================================================================
# IMPOSTAZIONI GENERALI
#=============================================================================

# Formato data usato nel plugin per visualizzare i timestamp.
# Usa i pattern di Java SimpleDateFormat.
# Pattern comuni:
#   dd    - Giorno del mese (01-31)
#   MM    - Mese (01-12)
#   yyyy  - Anno (4 cifre)
#   HH    - Ora formato 24h (00-23)
#   hh    - Ora formato 12h (01-12)
#   mm    - Minuti (00-59)
#   ss    - Secondi (00-59)
# Esempi:
#   "dd/MM/yyyy HH:mm:ss" ‚Üí "25/12/2024 14:30:45"
#   "MM-dd-yyyy hh:mm a"  ‚Üí "12-25-2024 02:30 PM"
date-format: dd/MM/yyyy HH:mm:ss

# Fuso orario utilizzato per la visualizzazione delle date.
# Utilizza gli identificatori Java TimeZone. Imposta "auto" per usare il fuso orario predefinito del server.
# Esempi:
#   "auto"              ‚Üí Usa il fuso orario predefinito del server
#   "UTC"               ‚Üí Tempo Universale Coordinato
#   "Europe/Paris"      ‚Üí Ora dell'Europa Centrale (UTC+1/UTC+2)
#   "America/New_York"  ‚Üí Ora Orientale (UTC-5/UTC-4)
#   "Asia/Tokyo"        ‚Üí Ora Standard del Giappone (UTC+9)
# Lista completa: https://docs.oracle.com/javase/8/docs/api/java/util/TimeZone.html
timezone: auto

#=============================================================================
# CONFIGURAZIONE DATABASE
#=============================================================================

# Tipo di archiviazione per i dati delle aste.
# Opzioni disponibili:
# - SQLITE  : Database locale su file (predefinito, nessuna configurazione richiesta)
#             Ideale per: Server singolo, case d'aste piccole-medie
# - MYSQL   : Server database MySQL
#             Ideale per: Configurazioni multi-server, grandi case d'aste
# - MARIADB : Server database MariaDB (compatibile MySQL)
#             Ideale per: Configurazioni multi-server, grandi case d'aste
# Nota: Per la sincronizzazione multi-server, usa MySQL/MariaDB con l'addon Redis.
storage-type: SQLITE

# Identificatore del nome del server per configurazioni multi-server.
# Questo nome viene memorizzato con ogni annuncio per identificare da quale server proviene.
# Utile per tracciare l'origine delle vendite con un DB condiviso tra pi√Ļ server.
# Consigliato: Usa un nome unico e descrittivo (es: "skyblock", "survival", "creative").
server-name: skyblock

# Impostazioni di connessione per MySQL/MariaDB.
# Usato solo quando 'storage-type' √® MYSQL o MARIADB.
database-configuration:
  # Prefisso applicato a tutte le tabelle create dal plugin.
  # Utile per condividere un DB con altri plugin e evitare conflitti di nomi.
  # ATTENZIONE: Non cambiare dopo che il plugin ha memorizzato dati, altrimenti andranno persi.
  # Tabelle create per default: {prefix}items, {prefix}auction_items, {prefix}players, ecc.
  table-prefix: zauctionhousev4_

  # Indirizzo IP o hostname del server database.
  # Usa 'localhost' o '127.0.0.1' se il DB √® sulla stessa macchina.
  # Per DB remoti, usa l'indirizzo IP o il nome di dominio del server.
  host: 192.168.10.10

  # Numero di porta del server database.
  # Porta predefinita MySQL/MariaDB: 3306
  # Cambia solo se il tuo DB usa una porta non standard.
  port: 3306

  # Nome utente per l'autenticazione.
  # Questo utente deve avere i permessi: SELECT, INSERT, UPDATE, DELETE, CREATE TABLE
  user: homestead

  # Password dell'utente.
  # Tienila sicura e non condividere il tuo file di configurazione pubblicamente.
  password: secret

  # Nome del database dove verranno memorizzati i dati.
  # Il database deve esistere prima dell'avvio del plugin.
  # Il plugin creer√† automaticamente le tabelle richieste.
  database: zauctionhouse

  # Attiva il debug delle query SQL.
  # Quando attivato, tutte le query SQL vengono registrate nella console.
  # ATTENZIONE: Questo genera molto output. Attiva solo per la risoluzione problemi del DB.
  # Consigliato: Tenere disattivato in produzione.
  debug: false

#=============================================================================
# SCORCIATOIE DI COLORE PER I MESSAGGI
#=============================================================================

# Chiavi di colore personalizzate usabili nei messaggi del plugin.
# Queste scorciatoie semplificano la personalizzazione definendo codici colore riutilizzabili.
# Utilizzo: Scrivi <primary> in qualsiasi messaggio e sar√† sostituito dal colore hex.
# Supporta il formato MiniMessage e i colori hex (#RRGGBB).
#
# Esempio di utilizzo nei messaggi:
#   "<primary>Benvenuto <secondary>nella casa d'aste!"
#   Diventa: "#24d65d Benvenuto #656665 nella casa d'aste!"
message-colors:
  # Colore primario - Usato per testo importante, titoli, evidenziazioni
  - key: <primary>
    color: '#24d65d'
  # Colore secondario - Usato per testo meno importante, descrizioni
  - key: <secondary>
    color: '#656665'
  # Colore errore - Usato per messaggi di errore, avvisi
  - key: <error>
    color: '#ff0000'
  # Colore successo - Usato per messaggi di successo, conferme
  - key: <success>
    color: '#00ff00'

#=============================================================================
# CONFIGURAZIONE DEI COMANDI
#=============================================================================

# Configurazione dei comandi per alias e argomenti.
# IMPORTANTE: Riavvio del server richiesto dopo la modifica di questa sezione!
# Le modifiche ai comandi non vengono applicate con /ah admin reload.

commands:
  # Comando principale: /zauctionhouse (apre la casa d'aste)
  main-command:
    # Nomi di comando alternativi che funzionano identicamente a /zauctionhouse
    # I giocatori possono usare qualsiasi di questi per aprire la casa d'aste.
    aliases:
      - ah           # Corto e comune
      - cda          # Abbreviazione italiana (Casa D'Aste)
      - auction      # Nome inglese completo
      - zauction     # Versione con prefisso del plugin

  # Comando di vendita: /zauctionhouse sell <prezzo> [quantit√†] [economia]
  # Usato dai giocatori per mettere oggetti in vendita.
  sell:
    # Quando attivato, eseguire /ah sell senza argomenti apre un GUI
    # dove il giocatore pu√≤ selezionare oggetti, regolare il prezzo e scegliere l'economia.
    # Quando disattivato, /ah sell richiede un argomento prezzo.
    # Consigliato: Attivare per una migliore esperienza utente, disattivare per power user.
    enable-sell-inventory: false

    # Nomi alternativi per il sottocomando sell.
    # Esempio: /ah s 1000 (mette in vendita l'oggetto in mano per 1000)
    aliases:
      - sell
      - s
      - vendi        # Italiano

    # Configurazione degli argomenti del comando
    arguments:
      # Argomento prezzo (richiesto quando l'inventario di vendita √® disattivato)
      - name: price
        display-name: prezzo
        required: true
        # Suggerimenti di autocompletamento per il prezzo
        # Appaiono quando il giocatore preme Tab durante la digitazione.
        auto-completion:
          - 1000
          - 10000
          - 25000

      # Argomento quantit√† (opzionale) - Quanti oggetti vendere dallo stack
      - name: amount
        display-name: quantit√†
        required: false
        # %max-stack-size% viene sostituito dalla dimensione max dello stack dell'oggetto
        auto-completion:
          - '1'
          - '%max-stack-size%'

      # Argomento economia (opzionale) - Quale valuta usare
      - name: economy
        display-name: economia
        required: false
        # Elenca qui i nomi delle tue economie attivate per l'autocompletamento
        auto-completion:
          - vault

  # Comando claim: /zauctionhouse claim
  # Usato per riscuotere i soldi in sospeso dalle vendite (quando auto-claim √® disattivato).
  claim:
    aliases:
      - claim
      - c
      - riscuoti     # Italiano

  # Comando cerca: /zauctionhouse search <ricerca>
  # Cerca oggetti nella casa d'aste per testo.
  search:
    aliases:
      - search
      - s
      - cerca          # Italiano
    arguments:
      - name: query
        display-name: ricerca
        required: true
        auto-completion: []

  # Comando page: /zauctionhouse page <numero>
  # Apre la casa d'aste direttamente a una pagina specifica.
  page:
    aliases:
      - page
      - p
      - pagina       # Italiano
    arguments:
      - name: page
        display-name: pagina
        required: true
        auto-completion:
          - '1'
          - '2'
          - '3'
          - '5'
          - '10'

  # Comandi inventario personalizzati
  # Questi comandi forniscono accesso rapido a sezioni specifiche.
  # Ogni voce crea un nuovo sottocomando sotto /zauctionhouse.
  inventories:
    # Comando: /ah selling - Apre gli oggetti attualmente in vendita del giocatore
    - enable: true
      # Permesso richiesto per usare questo comando (lasciare vuoto = nessun permesso)
      permission: "zauctionhouse.selling"
      # Descrizione mostrata nell'aiuto e nell'autocompletamento
      description: "Aprire gli oggetti in vendita"
      aliases:
        - 'selling'
        - 'invendita'
      # Identificatore interno dell'inventario (vedi cartella inventories/)
      inventory: SELLING_ITEMS
      # Decommentare per attivare l'argomento pagina: /ah selling <pagina>
      # enable-page: true
      # page-name: "pagina"

    # Comando: /ah expired - Apre gli oggetti scaduti del giocatore
    - enable: true
      permission: "zauctionhouse.expired"
      description: "Aprire gli oggetti scaduti"
      aliases:
        - 'expired'
        - 'scaduti'
      inventory: EXPIRED_ITEMS

    # Comando: /ah purchased - Apre gli oggetti acquistati dal giocatore
    - enable: true
      permission: "zauctionhouse.purchased"
      description: "Aprire gli oggetti acquistati"
      aliases:
        - 'purchased'
        - 'acquistati'
      inventory: PURCHASED_ITEMS

    # Comando: /ah history - Apre lo storico delle vendite del giocatore
    - enable: true
      permission: "zauctionhouse.history"
      description: "Aprire lo storico"
      aliases:
        - 'history'
        - 'storico'
      inventory: HISTORY

  # Configurazione del cooldown dei comandi
  # Impedisce ai giocatori di spammare comandi imponendo un ritardo tra le esecuzioni.
  # NOTA: Questi valori VENGONO ricaricati con /ah admin reload.
  cooldown:

    # Cooldown predefinito in millisecondi applicato a tutti i comandi.
    # Imposta a 0 per disabilitare completamente il cooldown.
    # ATTENZIONE: Si consiglia vivamente di mantenere un cooldown (es: 100ms) per prevenire lo spam di comandi.
    default-cooldown: 100

    # Permesso che consente a un giocatore di bypassare il cooldown dei comandi.
    bypass-permission: "zauctionhouse.cooldown.command.bypass"

    # Cooldown personalizzati per comando (in millisecondi).
    # Usa il primo alias del comando come chiave.
    # I comandi non elencati qui useranno il valore default-cooldown.
    # Esempi:
    #   sell: 500      # 500ms di cooldown per /ah sell
    #   claim: 1000    # 1 secondo di cooldown per /ah claim
    #   page: 50       # 50ms di cooldown per /ah page
    per-command: {}

#=============================================================================
# SCORCIATOIE DI PREZZO
#=============================================================================

# Scorciatoie di moltiplicazione per i comandi di vendita.
# Permette ai giocatori di usare una notazione abbreviata per numeri grandi.
# Esempio: /ah sell 1K = /ah sell 1000
# Esempio: /ah sell 2.5M = /ah sell 2500000
number-sell-multiplication:
  # Attivare o disattivare questa funzionalit√†
  enable: true

  # Definizioni di formato (senza distinzione maiuscole/minuscole)
  # I giocatori digitano il suffisso 'format', e il prezzo viene moltiplicato per 'multiplication'.
  formats:
    - format: K          # Migliaia (1 000)
      multiplication: 1000
    - format: M          # Milioni (1 000 000)
      multiplication: 1000000
    - format: B          # Miliardi (1 000 000 000)
      multiplication: 1000000000
    - format: T          # Bilioni
      multiplication: 1000000000000
    - format: Q          # Biliardi
      multiplication: 1000000000000000
    - format: QQ         # Trilioni
      multiplication: 1000000000000000000
    - format: S          # Triliardi
      multiplication: 1000000000000000000000
    - format: SS         # Quadrilioni
      multiplication: 1000000000000000000000000
    - format: O          # Quadriliardi
      multiplication: 1000000000000000000000000000
    - format: N          # Quintilioni
      multiplication: 1000000000000000000000000000000
    - format: D          # Quintiliardi
      multiplication: 1000000000000000000000000000000000
    - format: UN         # Sestilioni
      multiplication: 1000000000000000000000000000000000000
    - format: DD         # Sestiliardi
      multiplication: 1000000000000000000000000000000000000000
    - format: TR         # Settilioni
      multiplication: 1000000000000000000000000000000000000000000

#=============================================================================
# IMPOSTAZIONI DI SCADENZA
#=============================================================================

# Tempo di scadenza per i diversi stati degli oggetti.
# Tutti i tempi sono in SECONDI.
# Valori comuni:
#   3600    = 1 ora
#   86400   = 1 giorno
#   172800  = 2 giorni
#   259200  = 3 giorni
#   604800  = 1 settimana
#   2592000 = 30 giorni

expiration:
  # Durata degli annunci prima della scadenza.
  auction:
    # Tempo di scadenza predefinito in secondi (172800 = 2 giorni)
    # Dopo questo tempo, gli oggetti non venduti vanno nella sezione "oggetti scaduti".
    default-expiration: 172800

    # Tempi di scadenza basati sui permessi.
    # I giocatori con permessi specifici possono avere durate diverse.
    permission:
      # Attivare o disattivare la scadenza basata sui permessi
      enable: false
      # Lista dei permessi (verificate in ordine, prima corrispondenza usata)
      # IMPORTANTE: Ordinare dalla priorit√† pi√Ļ bassa alla pi√Ļ alta
      permissions:
        - permission: zauctionhouse.expiration.vip
          expiration: 3600       # 1 ora
        - permission: zauctionhouse.expiration.elite
          expiration: 7200       # 2 ore
        - permission: zauctionhouse.expiration.legend
          expiration: 259200     # 3 giorni

  # Durata degli annunci d'asta (funzionalit√† futura).
  bid:
    default-expiration: 172800
    permission:
      enable: false
      permissions:
        - permission: zauctionhouse.expiration.vip
          expiration: 3600
        - permission: zauctionhouse.expiration.elite
          expiration: 7200
        - permission: zauctionhouse.expiration.legend
          expiration: 259200

  # Durata degli annunci di noleggio (funzionalit√† futura).
  rent:
    default-expiration: 172800
    permission:
      enable: false
      permissions:
        - permission: zauctionhouse.expiration.vip
          expiration: 3600
        - permission: zauctionhouse.expiration.elite
          expiration: 7200
        - permission: zauctionhouse.expiration.legend
          expiration: 259200

  # Durata di conservazione degli oggetti scaduti prima della cancellazione definitiva.
  # Dopo questo tempo, gli oggetti scaduti non ritirati vengono definitivamente persi.
  # Consigliato: Almeno 1 settimana per dare ai giocatori tempo di ritirare i loro oggetti.
  expire:
    default-expiration: 604800   # 1 settimana
    permission:
      enable: false

  # Durata di conservazione degli oggetti acquistati prima della cancellazione definitiva.
  # Dopo questo tempo, gli oggetti acquistati non ritirati vengono definitivamente persi.
  # Consigliato: Almeno 1 settimana per dare ai giocatori tempo di ritirare i loro oggetti.
  purchase:
    default-expiration: 604800   # 1 settimana
    permission:
      enable: false

#=============================================================================
# LIMITI DEGLI ANNUNCI
#=============================================================================

# Numero massimo di oggetti che un giocatore pu√≤ avere in vendita contemporaneamente.
# I giocatori hanno bisogno di permessi specifici per aumentare il loro limite.

permissions:
