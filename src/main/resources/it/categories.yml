#     - type: material
#       materials:
#         - DIAMOND_BLOCK
#         - EMERALD_BLOCK
#
# Non dimenticare di aggiungere anche un pulsante per la tua categoria in:
# inventories/categories.yml
#
# ESEMPI:
#
# # Categoria personalizzata per gli oggetti ItemsAdder
# oggetti-personalizzati:
