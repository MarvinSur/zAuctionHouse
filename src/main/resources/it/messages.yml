# Mostrato quando la migrazione non è configurata.
# Placeholder disponibili:
#   %source% - Nome della sorgente di migrazione
migration-not-configured: "<error>La migrazione per <white>%source%<error> non è configurata. Configura la sezione <white>migration<error> in config.yml."

# Mostrato quando viene specificata una sorgente di migrazione sconosciuta.
# Placeholder disponibili:
#   %source% - Nome sorgente non valido
migration-invalid-source: "<error>Sorgente di migrazione sconosciuta: <white>%source%"

# Mostrato per elencare le sorgenti di migrazione disponibili.
# Placeholder disponibili:
#   %sources% - Lista delle sorgenti valide separate da virgole
migration-available-sources: "<gray>Sorgenti disponibili: %sources%"

# Informazioni sulla migrazione prima della conferma.
# Placeholder disponibili:
#   %source%  - Nome della sorgente di migrazione
#   %details% - Dettagli della configurazione di migrazione
migration-info:
  - "<primary>Migrazione da <white>%source%"
  - "<gray>Dettagli: <white>%details%"

# Richiesta di conferma della migrazione.
# Placeholder disponibili:
#   %source% - Nome della sorgente di migrazione
migration-confirm:
  - "<gray>Esegui <white>/ah admin migrate %source% confirm<gray> per avviare la migrazione."
  - "<error>⚠ ATTENZIONE: Questo importerà dati in V4. Assicurati di fare un backup dei tuoi dati prima!"

# Mostrato quando la migrazione inizia.
# Placeholder disponibili:
#   %source% - Nome della sorgente di migrazione
migration-started: "<success>Migrazione da <white>%source%<success> avviata... Potrebbe richiedere un po' di tempo."

# Aggiornamenti di progressione durante la migrazione.
# Placeholder disponibili:
#   %progress% - Messaggio di progressione attuale
migration-progress: "<gray>[Migrazione] %progress%"

# Mostrato quando la migrazione termina con successo.
# Placeholder disponibili:
#   %source%       - Nome della sorgente di migrazione
#   %players%      - Numero di giocatori migrati
#   %items%        - Numero di oggetti migrati
#   %transactions% - Numero di transazioni migrate
#   %errors%       - Numero di errori riscontrati
#   %duration%     - Tempo impiegato in millisecondi
migration-success:
  - "<success>Migrazione da <white>%source%<success> completata con successo!"
  - "<gray>  Giocatori: <white>%players%"
  - "<gray>  Oggetti: <white>%items%"
  - "<gray>  Transazioni: <white>%transactions%"
  - "<gray>  Errori: <white>%errors%"
  - "<gray>  Durata: <white>%duration%ms"

# Mostrato quando la migrazione fallisce.
# Placeholder disponibili:
#   %error% - Messaggio di errore
migration-failed: "<error>La migrazione è fallita: <white>%error%"

