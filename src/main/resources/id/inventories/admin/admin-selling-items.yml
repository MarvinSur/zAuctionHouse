################################################################################################################################
#
#   zAuctionHouse V4 - Menu Admin Barang Jualan
#
#   Menu ini ngasih admin akses buat ngecek dan ngurusin barang yang lagi dijual player.
#   Admin bisa nurunin/ngebatalin jualan atas nama player tersebut.
#
#   TINDAKAN ADMIN:
#   - Liat semua barang yang lagi tayang buat dijual sama si player
#   - Tarik barang dari jualan (ngebatalin jualannya)
#   - Kepake banget buat nurunin barang yang ngelanggar aturan atau penipuan
#
#   CARA BUKA:
#   - Dari menu utama riwayat admin → Tombol Barang Dijual
#   - /ah admin open selling <player>
#
#   Dokumentasi: https://docs.groupez.dev/zauctionhouse/introduction
#   Discord: https://discord.groupez.dev/
#
################################################################################################################################

#=============================================================================
# PENGATURAN MENU
#=============================================================================

# Judul menu dengan placeholder halaman.
# Catatan: Judulnya pake "listed" (tayang) tapi tipenya tetep "selling" biar seragam.
name: '#0c1719Admin barang jualan (%page%/%max-page%)'

# Ukuran menu - 6 baris.
size: 54

#=============================================================================
# POLA MENU
#=============================================================================

patterns:
  # Nambahin hiasan kaca di pinggiran.
  - 'zauctionhouse-decoration'
  # Tombol halaman sebelumnya/selanjutnya.
  - 'zauctionhouse-pagination'
  # Tombol kembali ke menu utama riwayat admin.
  - 'zauctionhouse-back'

#=============================================================================
# TOMBOL & TAMPILAN
#=============================================================================

items:

  #---------------------------------------------------------------------------
  # TAMPILAN BARANG JUALAN
  #---------------------------------------------------------------------------
  # Nampilin semua barang yang lagi ditayangin buat dijual sama player yang dituju.
  # Klik barangnya buat nurunin barang itu dari jualan (tindakan admin).

  items:
    # Tipe tombol - nampilin barang jualan admin yang bisa ditarik.
    type: ZAUCTIONHOUSE_ADMIN_SELLING_ITEMS

    # Slot buat nampilin barang jualan (4 baris × 9 kolom = 36 slot).
    slots:
      - 9-17    # Baris 2
      - 18-26   # Baris 3
      - 27-35   # Baris 4
      - 36-44   # Baris 5

    # Tampilan pas gak ada barang yang lagi dijual.
    else:
      slots:
        - 22
      item:
        material: BARRIER
        name: '#ff0000&nBelum Ada Jualan'
