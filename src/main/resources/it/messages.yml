# DESCRIZIONI DEI COMANDI
#=============================================================================
# Descrizioni mostrate nei menu di aiuto e nell'autocompletamento.
# Devono essere corte e descrittive.

command-description-auction: "Aprire la casa d'aste"
command-description-auction-sell: "Mettere un oggetto in vendita"
command-description-auction-rent: "Mettere un oggetto in affitto"
command-description-auction-bid: "Mettere un oggetto all'asta"
command-description-auction-reload: "Ricaricare i file di configurazione"
command-description-auction-admin: "Aprire gli strumenti di amministrazione"
command-description-auction-admin-generate: "Generare oggetti fittizi"
command-description-auction-admin-open: "Aprire gli oggetti in vendita attuali"
command-description-auction-admin-forceopen: "Aprire qualsiasi inventario per un giocatore"
command-description-auction-admin-history: "Aprire lo storico di un giocatore"
command-description-auction-admin-add: "Aggiungere un oggetto alla casa d'aste"
command-description-auction-admin-cache: "Gestire la cache dei giocatori"
command-description-auction-admin-cache-set: "Impostare un valore nella cache"
command-description-auction-admin-cache-clear: "Svuotare la cache di un giocatore"
command-description-auction-admin-cache-show: "Mostrare la cache di un giocatore"
command-description-auction-claim: "Riscuotere il denaro in sospeso dalle vendite"
command-description-auction-page: "Aprire la casa d'aste a una pagina specifica"
command-description-auction-migrate: "Migrare i dati da un altro plugin"

